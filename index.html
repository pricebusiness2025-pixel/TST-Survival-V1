<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mars Open Surface</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
background:rgba(0,0,0,0.4);
padding:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD (OPEN TERRAIN)
========================= */

const MAP=60;
let world=[];

/*
0 = sand
1 = rock
2 = glowing plant
*/

function generateWorld(){

for(let y=0;y<MAP;y++){
world[y]=[];

for(let x=0;x<MAP;x++){

let r=Math.random();

if(r<0.78) world[y][x]=0;
else if(r<0.93) world[y][x]=1;
else world[y][x]=2;

}

}

/* crash zone */
for(let y=10;y<18;y++){
for(let x=10;x<18;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:30,
y:30,
a:0,
vx:0,
vy:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){
const pads=navigator.getGamepads();
return pads ? pads[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   UPDATE PLAYER
========================= */

function updatePlayer(){

const pad=getPad();
if(!pad) return;

let lx=dz(pad.axes[0]);
let ly=dz(pad.axes[1]);
let rx=dz(pad.axes[2]);

lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

player.a += rx*0.05;

const accel=pad.buttons[5].pressed?0.01:0.006;
const friction=0.78;

/* movement */
player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

player.x+=player.vx;
player.y+=player.vy;

}

/* =========================
   TERRAIN HEIGHT VISUAL (FAKE DEPTH)
========================= */

function drawGround(){

let sky=ctx.createLinearGradient(0,0,0,canvas.height/2);
sky.addColorStop(0,"#2b0a3d");
sky.addColorStop(0.5,"#7a1b5e");
sky.addColorStop(1,"#ff4fa3");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height/2);

/* sun */
let sunX=canvas.width*0.5+(player.x-30)*10;

ctx.fillStyle="rgba(255,80,40,0.95)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,60,0,Math.PI*2);
ctx.fill();

/* ground gradient */
let ground=ctx.createLinearGradient(
0,canvas.height/2,
0,canvas.height
);

ground.addColorStop(0,"#c79a63");
ground.addColorStop(1,"#7b552f");

ctx.fillStyle=ground;
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

}

/* =========================
   DRAW TERRAIN OBJECTS (NO WALLS)
========================= */

function drawObjects(){

for(let y=0;y<MAP;y++){
for(let x=0;x<MAP;x++){

let tile=world[y][x];
if(tile===0) continue;

/* distance */
let dx=x-player.x;
let dy=y-player.y;
let dist=Math.sqrt(dx*dx+dy*dy);

/* angle */
let angle=Math.atan2(dy,dx)-player.a;

while(angle<-Math.PI) angle+=Math.PI*2;
while(angle>Math.PI) angle-=Math.PI*2;

/* only forward view */
if(Math.abs(angle)>1.2) continue;

/* screen position */
let screenX=(canvas.width/2)+Math.tan(angle)*(canvas.width/2);

/* size based on distance */
let size=canvas.height/(dist*1.5);

/* fog */
let alpha=Math.max(0.1,1-dist/18);

/* colors */
let color;

if(tile===1) color="160,120,80"; // rock
if(tile===2) color="80,255,180"; // glow plant

ctx.globalAlpha=alpha;

ctx.fillStyle=`rgb(${color})`;
ctx.fillRect(
screenX-size/2,
(canvas.height/2)-size/2,
size,
size
);

ctx.globalAlpha=1;

}
}

}

/* =========================
   LOOP
========================= */

function loop(){

updatePlayer();

drawGround();
drawObjects();

document.getElementById("ui").innerHTML=
`
🪐 MARS SURFACE (NO WALLS)<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
