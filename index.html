<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ruined City FPS - Wildlife Pass</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.45);
padding:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD
========================= */

const MAP=50;
let world=[];

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

if(
x===0||
y===0||
x===MAP-1||
y===MAP-1
){
world[y][x]=1;
}
else if(x%7===0||y%7===0){
world[y][x]=0;
}
else if(Math.random()<0.82){
world[y][x]=1;
}
else{
world[y][x]=0;
}

}

}

/* spawn */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0,
vx:0,
vy:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){
const pads=navigator.getGamepads();
return pads ? pads[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   WILDLIFE ENTITIES
========================= */

let entities=[];

/* spawn wildlife */
for(let i=0;i<18;i++){

let type=Math.random();

entities.push({
x:10+Math.random()*30,
y:10+Math.random()*30,
vx:0,
vy:0,
type:
type<0.4?"rabbit":
type<0.75?"deer":"wolf"
});
}

/* =========================
   WALL
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(x<0||y<0||x>=MAP||y>=MAP) return 1;
return world[y][x];

}

/* =========================
   UPDATE PLAYER
========================= */

function updatePlayer(){

const pad=getPad();
if(!pad) return;

let lx=dz(pad.axes[0]);
let ly=dz(pad.axes[1]);
let rx=dz(pad.axes[2]);

/* analog curve */
lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

player.a += rx*0.06;

/* movement */
const accel=pad.buttons[5].pressed?0.008:0.005;
const friction=0.72;

player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

/* clamp */
let sp=Math.hypot(player.vx,player.vy);
let max=pad.buttons[5].pressed?0.16:0.1;

if(sp>max){
player.vx=(player.vx/sp)*max;
player.vy=(player.vy/sp)*max;
}

let nx=player.x+player.vx;
let ny=player.y+player.vy;

const r=0.2;

if(!wall(nx+r,player.y)&&!wall(nx-r,player.y)){
player.x=nx;
}else player.vx*=0.3;

if(!wall(player.x,ny+r)&&!wall(player.x,ny-r)){
player.y=ny;
}else player.vy*=0.3;

}

/* =========================
   UPDATE ENTITIES
========================= */

function updateEntities(){

for(let e of entities){

let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.hypot(dx,dy);

/* simple AI */
if(e.type==="rabbit"){

/* random wander */
e.vx+=(Math.random()-0.5)*0.01;
e.vy+=(Math.random()-0.5)*0.01;

}

/* deer = calm wander */
if(e.type==="deer"){
e.vx+=(Math.random()-0.5)*0.008;
e.vy+=(Math.random()-0.5)*0.008;
}

/* wolf = flee or stalk */
if(e.type==="wolf"){

if(dist<6){
/* flee */
e.vx-=(dx/dist)*0.02;
e.vy-=(dy/dist)*0.02;
}else{
/* wander */
e.vx+=(Math.random()-0.5)*0.006;
e.vy+=(Math.random()-0.5)*0.006;
}

}

/* friction */
e.vx*=0.9;
e.vy*=0.9;

/* move */
let nx=e.x+e.vx;
let ny=e.y+e.vy;

if(!wall(nx,e.y)) e.x=nx;
if(!wall(e.x,ny)) e.y=ny;

}

}

/* =========================
   RENDER WORLD
========================= */

function renderWorld(){

ctx.fillStyle="#425d7a";
ctx.fillRect(0,0,canvas.width,canvas.height/2);

ctx.fillStyle="#2d2d2d";
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

const FOV=Math.PI/3;

for(let x=0;x<canvas.width;x+=8){

let ray=(player.a-FOV/2)+(x/canvas.width)*FOV;

let dist=0;
let hit=false;

while(!hit && dist<16){

dist+=0.08;

let rx=player.x+Math.cos(ray)*dist;
let ry=player.y+Math.sin(ray)*dist;

if(wall(rx,ry)) hit=true;

}

let corrected=dist*Math.cos(ray-player.a);

let h=canvas.height/(corrected+0.2);

let shade=170-corrected*10;
if(shade<30) shade=30;

ctx.fillStyle=`rgb(${shade},${shade},${shade+8})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
8,
h
);

}

}

/* =========================
   RENDER ENTITIES (DOOM SPRITES)
========================= */

function renderEntities(){

/* sort far to near */
entities.sort((a,b)=>{
let da=Math.hypot(player.x-a.x,player.y-a.y);
let db=Math.hypot(player.x-b.x,player.y-b.y);
return db-da;
});

for(let e of entities){

let dx=e.x-player.x;
let dy=e.y-player.y;

let dist=Math.hypot(dx,dy);

/* angle to entity */
let angle=Math.atan2(dy,dx)-player.a;

/* normalize angle */
while(angle<-Math.PI) angle+=Math.PI*2;
while(angle>Math.PI) angle-=Math.PI*2;

/* skip behind player */
if(Math.abs(angle)>1.2) continue;

/* screen position */
let screenX=
(canvas.width/2)+
Math.tan(angle)*(canvas.width/2);

/* size */
let size=
canvas.height/(dist*1.2);

/* color by type */
let color;

if(e.type==="rabbit") color="255,255,255";
if(e.type==="deer") color="160,120,80";
if(e.type==="wolf") color="60,60,60";

/* draw sprite */
ctx.fillStyle=`rgba(${color},0.9)`;

ctx.fillRect(
screenX-size/2,
(canvas.height/2)-size/2,
size,
size
);

}

}

/* =========================
   LOOP
========================= */

function loop(){

updatePlayer();
updateEntities();

renderWorld();
renderEntities();

document.getElementById("ui").innerHTML=
`
🐾 ENTITIES: ${entities.length}<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
