<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ruined City Biomes FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.45);
padding:10px;
line-height:1.5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD TYPES
========================= */
/*
0 = street
1 = building
2 = ruins
3 = steampunk
4 = overgrowth
*/

const MAP=50;
let world=[];

/* =========================
   WORLD GEN
========================= */

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

if(x===0||y===0||x===MAP-1||y===MAP-1){
world[y][x]=1;
}

else if(x%7===0||y%7===0){
world[y][x]=0;
}

else{

let r=Math.random();

if(r<0.55) world[y][x]=1;
else if(r<0.75) world[y][x]=2;
else if(r<0.9) world[y][x]=3;
else world[y][x]=4;

}

}

}

/* spawn zone */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0,
vx:0,
vy:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){
const pads=navigator.getGamepads();
return pads ? pads[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   WALL CHECK
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(x<0||y<0||x>=MAP||y>=MAP) return 1;

return world[y][x];

}

/* =========================
   ENTITIES (WILDLIFE)
========================= */

let entities=[];

/* spawn in streets only */
for(let i=0;i<22;i++){

let x,y;

do{
x=Math.floor(Math.random()*MAP);
y=Math.floor(Math.random()*MAP);
}while(world[y][x]!==0);

entities.push({
x:x+0.5,
y:y+0.5,
vx:0,
vy:0,
type:
Math.random()<0.4?"rabbit":
Math.random()<0.75?"deer":"wolf"
});

}

/* =========================
   UPDATE PLAYER
========================= */

function updatePlayer(){

const pad=getPad();
if(!pad) return;

/* sticks */
let lx=dz(pad.axes[0]);
let ly=dz(pad.axes[1]);
let rx=dz(pad.axes[2]);

/* analog curve */
lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

/* camera */
player.a += rx*0.06;

/* movement */
const accel=pad.buttons[5].pressed?0.008:0.005;
const friction=0.72;

player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

/* clamp */
let sp=Math.hypot(player.vx,player.vy);
let max=pad.buttons[5].pressed?0.16:0.1;

if(sp>max){
player.vx=(player.vx/sp)*max;
player.vy=(player.vy/sp)*max;
}

/* move */
let nx=player.x+player.vx;
let ny=player.y+player.vy;

const r=0.2;

if(!wall(nx+r,player.y)&&!wall(nx-r,player.y)){
player.x=nx;
}else player.vx*=0.3;

if(!wall(player.x,ny+r)&&!wall(player.x,ny-r)){
player.y=ny;
}else player.vy*=0.3;

}

/* =========================
   UPDATE ENTITIES
========================= */

function updateEntities(){

for(let e of entities){

let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.hypot(dx,dy);

/* rabbit */
if(e.type==="rabbit"){
e.vx+=(Math.random()-0.5)*0.015;
e.vy+=(Math.random()-0.5)*0.015;
}

/* deer */
if(e.type==="deer"){
e.vx+=(Math.random()-0.5)*0.01;
e.vy+=(Math.random()-0.5)*0.01;
}

/* wolf */
if(e.type==="wolf"){

if(dist<6){
e.vx-=(dx/dist)*0.02;
e.vy-=(dy/dist)*0.02;
}else{
e.vx+=(Math.random()-0.5)*0.008;
e.vy+=(Math.random()-0.5)*0.008;
}

}

/* friction */
e.vx*=0.9;
e.vy*=0.9;

/* move */
let nx=e.x+e.vx;
let ny=e.y+e.vy;

if(!wall(nx,e.y)) e.x=nx;
if(!wall(e.x,ny)) e.y=ny;

}

}

/* =========================
   RENDER WORLD
========================= */

function renderWorld(){

ctx.fillStyle="#425d7a";
ctx.fillRect(0,0,canvas.width,canvas.height/2);

ctx.fillStyle="#2d2d2d";
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

const FOV=Math.PI/3;

for(let x=0;x<canvas.width;x+=8){

let ray=(player.a-FOV/2)+(x/canvas.width)*FOV;

let dist=0;
let hit=false;
let wallType=0;

while(!hit && dist<16){

dist+=0.08;

let rx=player.x+Math.cos(ray)*dist;
let ry=player.y+Math.sin(ray)*dist;

let wx=Math.floor(rx);
let wy=Math.floor(ry);

if(wx>=0&&wy>=0&&wx<MAP&&wy<MAP){

if(world[wy][wx]>0){
hit=true;
wallType=world[wy][wx];
}

}

}

/* fisheye */
let corrected=dist*Math.cos(ray-player.a);

/* wall height */
let h=canvas.height/(corrected+0.2);

/* base shading */
let shade=170-corrected*10;
if(shade<30) shade=30;

let r=shade,g=shade,b=shade;

/* biome tinting */
if(wallType===2){ r*=0.8; g*=0.8; b*=0.85; }
if(wallType===3){ r*=1.2; g*=0.9; b*=0.6; }
if(wallType===4){ r*=0.7; g*=1.1; b*=0.7; }

ctx.fillStyle=`rgb(${r},${g},${b})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
8,
h
);

}

}

/* =========================
   RENDER ENTITIES (EMOJI DOOM SPRITES)
========================= */

function renderEntities(){

entities.sort((a,b)=>{
return Math.hypot(b.x-player.x,b.y-player.y) -
Math.hypot(a.x-player.x,a.y-player.y);
});

for(let e of entities){

let dx=e.x-player.x;
let dy=e.y-player.y;

let dist=Math.hypot(dx,dy);

let angle=Math.atan2(dy,dx)-player.a;

while(angle<-Math.PI) angle+=Math.PI*2;
while(angle>Math.PI) angle-=Math.PI*2;

if(Math.abs(angle)>1.2) continue;

let screenX=
(canvas.width/2)+
Math.tan(angle)*(canvas.width/2);

let size=canvas.height/(dist*1.2);

/* emoji sprite */
let sprite="";

if(e.type==="rabbit") sprite="🐇";
if(e.type==="deer") sprite="🦌";
if(e.type==="wolf") sprite="🐺";

/* scaling */
let scale=Math.max(16,size);

if(e.type==="wolf") scale*=1.1;

ctx.font=`${scale}px monospace`;
ctx.textAlign="center";
ctx.textBaseline="middle";

/* fade with distance */
ctx.globalAlpha=Math.max(0.2,1-dist/18);

ctx.fillText(
sprite,
screenX,
canvas.height/2
);

ctx.globalAlpha=1;

}

}

/* =========================
   LOOP
========================= */

function loop(){

updatePlayer();
updateEntities();

renderWorld();
renderEntities();

document.getElementById("ui").innerHTML=
`
🐾 ENTITIES: ${entities.length}<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
