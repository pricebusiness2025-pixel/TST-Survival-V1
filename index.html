<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Survival v7.1 SAFE</title>

<style>
body{margin:0;background:#000;overflow:hidden;font-family:monospace;}
canvas{display:block;}
#ui{position:absolute;bottom:10px;left:10px;color:#888;font-size:12px;z-index:2;}
#device{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
color:#00ffcc;
padding:12px;
display:none;
z-index:3;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="device"></div>

<script>

/* =========================
   SAFE WRAPPER (CRITICAL)
========================= */

(function(){

"use strict";

/* =========================
   CANVAS SAFE INIT
========================= */

const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){
c.width=innerWidth||800;
c.height=innerHeight||600;
}
addEventListener("resize",resize);
resize();

/* =========================
   STATE SAFE INIT
========================= */

const STATE={
PLAY:"play",
DEVICE:"device",
COMBAT:"combat"
};

let state=STATE.PLAY;

/* =========================
   PLAYER SAFE INIT
========================= */

let card={
x:10,y:10,
health:100,
hunger:100,
inventory:{scrap:0}
};

/* =========================
   WORLD SAFE INIT
========================= */

const SIZE=20;
let world=[];

for(let y=0;y<SIZE;y++){
world[y]=[];
for(let x=0;x<SIZE;x++){
world[y][x]=Math.random()<0.8?".":Math.random()<0.9?"L":"F";
}
}

/* =========================
   INPUT SAFE INIT
========================= */

let keys={};

try{
addEventListener("keydown",e=>keys[e.code]=true);
addEventListener("keyup",e=>keys[e.code]=false);
}catch(e){}

/* =========================
   GAMEPAD SAFE (NO CRASH EVER)
========================= */

function gp(){
try{
let g=navigator.getGamepads?.();
return (g && g[0]) ? g[0] : null;
}catch(e){
return null;
}
}

/* =========================
   INPUT VECTOR SAFE
========================= */

function input(){

let x=0,y=0;

/* keyboard */
if(keys["ArrowUp"]) y--;
if(keys["ArrowDown"]) y++;
if(keys["ArrowLeft"]) x--;
if(keys["ArrowRight"]) x++;

/* controller SAFE */
let g=gp();

if(g && g.connected){

let ax=g.axes?.[0]||0;
let ay=g.axes?.[1]||0;

if(Math.abs(ax)>0.2) x+=ax;
if(Math.abs(ay)>0.2) y+=ay;

if(g.buttons?.[12]?.pressed) y--;
if(g.buttons?.[13]?.pressed) y++;
if(g.buttons?.[14]?.pressed) x--;
if(g.buttons?.[15]?.pressed) x++;

}

let len=Math.hypot(x,y);
if(len>1){x/=len;y/=len;}

return {x,y};
}

/* =========================
   DEVICE TOGGLE SAFE
========================= */

function toggleDevice(){
try{
state = (state===STATE.DEVICE) ? STATE.PLAY : STATE.DEVICE;
document.getElementById("device").style.display =
(state===STATE.DEVICE) ? "block" : "none";
}catch(e){}
}

/* =========================
   WORLD LOGIC SAFE
========================= */

function worldLogic(){

try{

let t=world[Math.floor(card.y)]?.[Math.floor(card.x)];

if(t==="L"){
world[Math.floor(card.y)][Math.floor(card.x)]=".";
card.inventory.scrap++;
}

if(t==="F" && Math.random()<0.005){
card.health -= 5;
}

}catch(e){}

}

/* =========================
   UPDATE SAFE (NO CRASH EVER)
========================= */

function update(){

try{

let i=input();

/* device toggle ALWAYS works */
if(keys["KeyE"]){
toggleDevice();
keys["KeyE"]=false;
}

/* movement only in play */
if(state===STATE.PLAY){
card.x += i.x*0.12;
card.y += i.y*0.12;

card.hunger -= 0.01;

worldLogic();
}

/* clamp SAFE */
card.x=Math.max(0,Math.min(SIZE-1,card.x||0));
card.y=Math.max(0,Math.min(SIZE-1,card.y||0));

}catch(e){
/* NEVER BREAK LOOP */
}

}

/* =========================
   RENDER SAFE (ALWAYS DRAWS)
========================= */

function render(){

try{

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#00ffcc";
ctx.fillText("@",c.width/2,c.height/2);

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let t=world[y]?.[x];
if(!t) continue;

let dx=x-card.x;
let dy=y-card.y;

let sx=c.width/2+dx*16;
let sy=c.height/2+dy*16;

ctx.fillStyle =
t==="L"?"#f1c40f":
t==="F"?"#ff4b1f":
"#2ecc71";

ctx.fillText(t,sx,sy);

}
}

}catch(e){
/* fallback render */
ctx.fillStyle="#0f0";
ctx.fillText("ENGINE RUNNING SAFE MODE",20,40);
}

}

/* =========================
   DEVICE UI SAFE
========================= */

function deviceUI(){

try{

document.getElementById("device").innerHTML=`
<h3>DEVICE</h3>
<p>STATE: ${state}</p>
<p>HP: ${card.health.toFixed(0)}</p>
<p>SCRAP: ${card.inventory.scrap}</p>
<p>INPUT: OK</p>
`;

}catch(e){}

}

/* =========================
   MAIN LOOP (GUARANTEED)
========================= */

function loop(){

update();
render();

if(state===STATE.DEVICE){
deviceUI();
}

requestAnimationFrame(loop);
}

/* =========================
   BOOT SAFE START
========================= */

setTimeout(()=>{
loop();
},100);

})(); // end wrapper

</script>

</body>
  </html>
