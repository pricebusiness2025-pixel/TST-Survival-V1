<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mars Crash Site FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.45);
padding:10px;
line-height:1.5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD TYPES
========================= */

const MAP=50;
let world=[];

/*
0 = empty
1 = structure
2 = ruins
3 = steampunk
4 = overgrowth
*/

/* =========================
   WORLD GEN
========================= */

function generateWorld(){

for(let y=0;y<MAP;y++){
world[y]=[];

for(let x=0;x<MAP;x++){

if(x===0||y===0||x===MAP-1||y===MAP-1){
world[y][x]=1;
}

else if(x%7===0||y%7===0){
world[y][x]=0;
}

else{

let r=Math.random();

if(r<0.55) world[y][x]=1;
else if(r<0.75) world[y][x]=2;
else if(r<0.9) world[y][x]=3;
else world[y][x]=4;

}

}

}

/* 🛸 CRASH SITE (SAFE ZONE) */
for(let y=6;y<16;y++){
for(let x=6;x<16;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0,
vx:0,
vy:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){
const pads=navigator.getGamepads();
return pads ? pads[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   ZONE SYSTEM
========================= */

function getZone(x,y){

let dx=x-10;
let dy=y-10;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<6) return "safe";
if(dist<18) return "normal";
return "dead";

}

/* =========================
   WALL
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(x<0||y<0||x>=MAP||y>=MAP) return 1;

return world[y][x];

}

/* =========================
   PLAYER UPDATE
========================= */

function updatePlayer(){

const pad=getPad();
if(!pad) return;

let lx=dz(pad.axes[0]);
let ly=dz(pad.axes[1]);
let rx=dz(pad.axes[2]);

/* analog curve */
lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

/* camera */
player.a += rx*0.06;

/* movement */
const accel=pad.buttons[5].pressed?0.008:0.005;
const friction=0.72;

player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

/* clamp */
let sp=Math.hypot(player.vx,player.vy);
let max=pad.buttons[5].pressed?0.16:0.1;

if(sp>max){
player.vx=(player.vx/sp)*max;
player.vy=(player.vy/sp)*max;
}

/* move */
let nx=player.x+player.vx;
let ny=player.y+player.vy;

const r=0.2;

if(!wall(nx+r,player.y)&&!wall(nx-r,player.y)){
player.x=nx;
}else player.vx*=0.3;

if(!wall(player.x,ny+r)&&!wall(player.x,ny-r)){
player.y=ny;
}else player.vy*=0.3;

}

/* =========================
   RENDER WORLD
========================= */

function renderWorld(){

/* 🌌 MARS SKY */
let sky=ctx.createLinearGradient(
0,0,0,canvas.height/2
);

sky.addColorStop(0,"#2b0a3d");
sky.addColorStop(0.5,"#7a1b5e");
sky.addColorStop(1,"#ff4fa3");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height/2);

/* ☀️ SUN */
ctx.fillStyle="rgba(255,120,180,0.9)";
ctx.beginPath();
ctx.arc(canvas.width*0.75,canvas.height*0.2,60,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="rgba(255,80,160,0.25)";
ctx.beginPath();
ctx.arc(canvas.width*0.75,canvas.height*0.2,120,0,Math.PI*2);
ctx.fill();

/* 🌋 GROUND */
ctx.fillStyle="#3a0f12";
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

const FOV=Math.PI/3;

for(let x=0;x<canvas.width;x+=10){

let ray=(player.a-FOV/2)+(x/canvas.width)*FOV;

let dist=0;
let hit=false;
let wallType=0;

while(!hit && dist<16){

dist+=0.08;

let rx=player.x+Math.cos(ray)*dist;
let ry=player.y+Math.sin(ray)*dist;

let wx=Math.floor(rx);
let wy=Math.floor(ry);

if(wx>=0&&wy>=0&&wx<MAP&&wy<MAP){

if(world[wy][wx]>0){
hit=true;
wallType=world[wy][wx];
}

}

}

let corrected=dist*Math.cos(ray-player.a);
let h=canvas.height/(corrected+0.2);

/* base tone */
let shade=140-corrected*12;
if(shade<30) shade=30;

/* Mars tint */
let r=shade,g=shade,b=shade;

if(wallType===2){ r*=0.8; g*=0.8; b*=0.85; }
if(wallType===3){ r*=1.2; g*=0.9; b*=0.6; }
if(wallType===4){ r*=0.7; g*=1.1; b*=0.7; }

ctx.fillStyle=`rgb(${r},${g},${b})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
10,
h
);

}

}

/* =========================
   LOOP
========================= */

function loop(){

updatePlayer();
renderWorld();

let zone=getZone(player.x,player.y);

document.getElementById("ui").innerHTML=
`
🛸 ZONE: ${zone.toUpperCase()}<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
