<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Survival City v3 - Full Working Model</title>
<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const SIZE=40;

/* ================= WORLD ================= */

let world=[];
let buildings=[];
let animals=[];

let inBuilding=false;

let p={x:10,y:10,a:0};

let inventory={scrap:0,food:0,ammo:3};
let hasGun=true;

let noise=0;

/* ================= GENERATION ================= */

function genWorld(){
for(let y=0;y<SIZE;y++){
world[y]=[];
for(let x=0;x<SIZE;x++){

if(x%6===0||y%6===0){
world[y][x]=0; // streets
}else{
world[y][x]=Math.random()<0.8?1:0;
}

}
}
}

function genBuildings(){
const t=["🏚️","🏢","🏭","🚓"];

for(let i=0;i<35;i++){
buildings.push({
x:Math.random()*SIZE,
y:Math.random()*SIZE,
t:t[Math.random()*t.length|0]
});
}
}

function genAnimals(){
for(let i=0;i<25;i++){
let r=Math.random();
animals.push({
x:Math.random()*SIZE,
y:Math.random()*SIZE,
t:r<0.2?"🐺":r<0.6?"🦌":"🐇",
vx:0,vy:0
});
}
}

genWorld();
genBuildings();
genAnimals();

/* ================= INPUT ================= */

function gp(){
return navigator.getGamepads?.()[0];
}

/* ================= TILE ================= */

function tile(x,y){
x|=0;y|=0;
if(x<0||y<0||x>=SIZE||y>=SIZE) return 1;
return world[y][x];
}

/* ================= BUILDING ================= */

function enterBuilding(){
inBuilding=true;
p.x=5;p.y=5;
noise+=2;
inventory.scrap++;
inventory.food++;
inventory.ammo++;
}

function exitBuilding(){
inBuilding=false;
p.x+=2;
p.y+=2;
}

/* ================= ANIMALS ================= */

function updateAnimals(){

for(let a of animals){

let dx=p.x-a.x;
let dy=p.y-a.y;
let d=Math.hypot(dx,dy);

/* wolves react to player + noise */
if(a.t==="🐺"){
if(noise>1){
a.vx += dx*0.002;
a.vy += dy*0.002;
}
}

/* deer flee wolves */
if(a.t==="🦌"){
for(let b of animals){
if(b.t==="🐺"){
let dd=Math.hypot(a.x-b.x,a.y-b.y);
if(dd<4){
a.vx += (a.x-b.x)*0.003;
a.vy += (a.y-b.y)*0.003;
}
}
}
}

/* rabbits random */
if(a.t==="🐇"){
a.vx += (Math.random()-0.5)*0.01;
}

/* move */
a.x += a.vx;
a.y += a.vy;

a.vx*=0.9;
a.vy*=0.9;

if(a.x<1||a.x>SIZE-1)a.vx*=-1;
if(a.y<1||a.y>SIZE-1)a.vy*=-1;

}

}

/* ================= MOVE ================= */

function move(){

let g=gp();
if(!g) return;

/* look */
p.a += (g.axes?.[2]||0)*0.04;

/* move */
let lx=g.axes?.[0]||0;
let ly=g.axes?.[1]||0;

let sp=g.buttons?.[5]?.pressed?0.08:0.04;

let nx=p.x+Math.cos(p.a)*(-ly)*sp;
let ny=p.y+Math.sin(p.a)*(-ly)*sp;

nx+=Math.cos(p.a+Math.PI/2)*lx*sp;
ny+=Math.sin(p.a+Math.PI/2)*lx*sp;

if(!inBuilding){
if(tile(nx,p.y)===0)p.x=nx;
if(tile(p.x,ny)===0)p.y=ny;
}

/* enter building */
for(let b of buildings){
if(Math.hypot(p.x-b.x,p.y-b.y)<1.5){
if(g.buttons?.[0]?.pressed){
enterBuilding();
}
}
}

/* exit */
if(inBuilding && g.buttons?.[1]?.pressed){
exitBuilding();
}

/* shoot */
if(g.buttons?.[7]?.pressed && inventory.ammo>0){
inventory.ammo--;
noise+=5;
}

}

/* ================= RENDER ================= */

function draw(){

ctx.fillStyle="#0b0f14";
ctx.fillRect(0,0,c.width,c.height);

/* raycast */
for(let i=0;i<c.width;i+=6){

let ra=p.a+(i-c.width/2)/180;

let d=0;

while(d<18){
d+=0.1;

let x=p.x+Math.cos(ra)*d;
let y=p.y+Math.sin(ra)*d;

if(tile(x,y)) break;

}

let shade=255-d*15;
shade=Math.max(40,shade);

ctx.fillStyle=`rgb(${shade},${shade},${shade})`;
ctx.fillRect(i,c.height/2,6,c.height/2);
}

/* buildings */
ctx.font="22px serif";

for(let b of buildings){

let dx=b.x-p.x;
let dy=b.y-p.y;
let d=Math.hypot(dx,dy);

if(d>10) continue;

let a=Math.atan2(dy,dx)-p.a;
if(Math.abs(a)>0.7) continue;

let x=(a/0.7)*(c.width/2)+c.width/2;

ctx.fillText(b.t,x,c.height/2);

}

/* animals */
ctx.font="18px serif";

for(let a of animals){

let dx=a.x-p.x;
let dy=a.y-p.y;
let d=Math.hypot(dx,dy);

if(d>10) continue;

let ang=Math.atan2(dy,dx)-p.a;
if(Math.abs(ang)>0.7) continue;

let x=(ang/0.7)*(c.width/2)+c.width/2;

ctx.fillText(a.t,x,c.height/2);

}

}

/* ================= LOOP ================= */

function loop(){

move();
updateAnimals();

if(inBuilding){
ctx.fillStyle="#111";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="white";
ctx.fillText("INTERIOR MODE",50,50);
ctx.fillText("B = exit",50,80);
}else{
draw();
}

noise*=0.96;

requestAnimationFrame(loop);
}

loop();

/* ================= UI ================= */

setInterval(()=>{
document.getElementById("ui").innerHTML=
`AMMO:${inventory.ammo}
SCRAP:${inventory.scrap}
FOOD:${inventory.food}
NOISE:${noise.toFixed(1)}
MODE:${inBuilding?"INSIDE":"OUTSIDE"}`;
},200);

</script>

</body>
</html>
