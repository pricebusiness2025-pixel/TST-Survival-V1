<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Survival v7 Stable</title>

<style>
body{margin:0;background:#000;overflow:hidden;font-family:monospace;}
canvas{display:block;}
#ui{position:absolute;bottom:10px;left:10px;color:#aaa;font-size:12px;}
#device{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
color:#00ffcc;
padding:14px;
display:none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="device"></div>

<script>

/* ================= SAFE CANVAS ================= */

const c=document.getElementById("c");
const ctx=c.getContext("2d");
ctx.font="16px monospace";

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
addEventListener("resize",resize);
resize();

/* ================= STATE ================= */

const STATE={PLAY:"play",DEVICE:"device",COMBAT:"combat"};
let state=STATE.PLAY;

/* ================= PLAYER ================= */

let card={
name:"SURVIVOR",
x:10,y:10,
health:100,
hunger:100,
inventory:{scrap:0,coal:0}
};

/* ================= WORLD ================= */

const SIZE=25;
let world=Array.from({length:SIZE},()=>Array(SIZE).fill("."));

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){
world[y][x]=Math.random()<0.8?".":Math.random()<0.9?"L":"F";
}
}

/* ================= INPUT ================= */

let keys={};
addEventListener("keydown",e=>keys[e.code]=true);
addEventListener("keyup",e=>keys[e.code]=false);

function gp(){
try{return navigator.getGamepads?.()[0];}
catch{return null;}
}

/* ================= INPUT VECTOR (SAFE) ================= */

function input(){

let x=0,y=0;

/* keyboard */
if(keys["ArrowUp"]) y--;
if(keys["ArrowDown"]) y++;
if(keys["ArrowLeft"]) x--;
if(keys["ArrowRight"]) x++;

/* controller SAFE */
let g=gp();
if(g && g.connected){

if(g.buttons?.[12]?.pressed) y--;
if(g.buttons?.[13]?.pressed) y++;
if(g.buttons?.[14]?.pressed) x--;
if(g.buttons?.[15]?.pressed) x++;

let ax=g.axes?.[0]||0;
let ay=g.axes?.[1]||0;

if(Math.abs(ax)>0.2) x+=ax;
if(Math.abs(ay)>0.2) y+=ay;

}

let len=Math.hypot(x,y);
if(len>1){x/=len;y/=len;}

return {x,y};
}

/* ================= COMBAT ================= */

let enemy=null;

function spawnEnemy(){
enemy={hp:40};
state=STATE.COMBAT;
}

function attack(){

if(!enemy) return;

let roll=Math.floor(Math.random()*20)+1;

if(roll>=15) enemy.hp-=20;
else if(roll<=5) card.health-=10;
else enemy.hp-=10;

if(enemy.hp<=0){
state=STATE.PLAY;
enemy=null;
card.inventory.scrap++;
}

}

/* ================= WORLD LOGIC ================= */

function worldLogic(){

let t=world[Math.floor(card.y)][Math.floor(card.x)];

if(t==="L"){
world[Math.floor(card.y)][Math.floor(card.x)]=".";
card.inventory.scrap++;
}

/* simple encounter */
if(t==="F" && Math.random()<0.005){
spawnEnemy();
}

}

/* ================= UPDATE ================= */

function update(){

let i=input();

/* DEVICE toggle safe */
if(keys["KeyE"]){
state = state===STATE.DEVICE?STATE.PLAY:STATE.DEVICE;
keys["KeyE"]=false;
}

/* PLAY */
if(state===STATE.PLAY){

card.x+=i.x*0.15;
card.y+=i.y*0.15;

card.hunger-=0.01;

worldLogic();

}

/* COMBAT */
if(state===STATE.COMBAT){

if(keys["Space"]){
attack();
keys["Space"]=false;
}

}

}

/* ================= RENDER ================= */

function render(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

let s=18;

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let dx=x-card.x;
let dy=y-card.y;

let sx=c.width/2+dx*s;
let sy=c.height/2+dy*s;

let t=world[y][x];

ctx.fillStyle=
t==="L"?"#f1c40f":
t==="F"?"#ff4b1f":
"#2ecc71";

ctx.fillText(t,sx,sy);

}
}

ctx.fillStyle="#00ffcc";
ctx.fillText("@",c.width/2,c.height/2);

/* enemy */
if(state===STATE.COMBAT){
ctx.fillText("ENEMY HP:"+enemy.hp,c.width/2-50,c.height/2-30);
}

}

/* ================= DEVICE ================= */

function deviceUI(){

document.getElementById("device").innerHTML=`
<h2>DEVICE</h2>

<p>${card.name}</p>

<p>HP:${card.health.toFixed(0)} HUN:${card.hunger.toFixed(0)}</p>

<p>SCRAP:${card.inventory.scrap}</p>

<p>STATE:${state}</p>

<p>${state==="COMBAT"?"FIGHT MODE (SPACE)":"SAFE"}</p>
`;

}

/* ================= LOOP ================= */

function loop(){

update();
render();

if(state===STATE.DEVICE) deviceUI();
if(state!==STATE.DEVICE) document.getElementById("device").style.display="none";

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
