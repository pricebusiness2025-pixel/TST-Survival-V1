<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Device Survival Index v5</title>

<style>
body { margin:0; background:#000; overflow:hidden; font-family:monospace; color:#00ffcc; }
canvas { display:block; background:#000; }

#device{
position:absolute; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.93);
display:none; padding:16px;
box-sizing:border-box;
color:#00ffcc;
}

#ui{
position:absolute; bottom:10px; left:10px;
font-size:12px; color:#888;
}

#boot{
position:absolute; top:0; left:0; width:100%; height:100%;
display:flex; align-items:center; justify-content:center;
background:#000; color:#00ffcc;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="device"></div>
<div id="boot">BOOTING DEVICE...</div>

<script>

/* =========================
   CANVAS
========================= */

const c=document.getElementById("c");
const ctx=c.getContext("2d");
ctx.font="16px monospace";

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* =========================
   STATE
========================= */

const STATE={PLAY:"play",DEVICE:"device"};
let state=STATE.PLAY;

/* =========================
   PLAYER
========================= */

let card=JSON.parse(localStorage.getItem("card")||"null");

if(!card){
card={
name:prompt("NAME?")||"UNKNOWN",
x:10,y:10,
health:100,
hunger:100,
scrap:0,
inventory:{wood:0,hardWood:0,scrap:0,parts:0,coal:0},
weapon:{durability:100,max:100}
};
}

/* =========================
   WORLD
========================= */

const SIZE=28;
let world=Array.from({length:SIZE},()=>Array(SIZE).fill("."));

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){
let r=Math.random();
world[y][x]=r<0.7?".":r<0.85?"F":r<0.95?"L":"R";
}
}

/* =========================
   VISIBILITY
========================= */

let seen=Array.from({length:SIZE},()=>Array(SIZE).fill(false));

/* =========================
   INPUT
========================= */

let keys={};

addEventListener("keydown",e=>{
keys[e.code]=true;
if(e.code==="KeyE") toggleDevice();
});
addEventListener("keyup",e=>keys[e.code]=false);

/* =========================
   CAMPFIRE
========================= */

let campfires=[];

/* =========================
   ENEMIES
========================= */

function spawnWolf(){
return {hp:60,def:5,atk:10};
}

/* =========================
   D20
========================= */

function d20(){
return Math.floor(Math.random()*20)+1;
}

/* =========================
   FIRE / SAFE ZONE
========================= */

function nearFire(x,y){

for(let i of campfires){
if(Math.hypot(i.x-x,i.y-y)<4) return true;
}
return false;
}

/* =========================
   MOVEMENT INPUT
========================= */

function input(){
let x=0,y=0;

if(keys["ArrowUp"]) y--;
if(keys["ArrowDown"]) y++;
if(keys["ArrowLeft"]) x--;
if(keys["ArrowRight"]) x++;

let gp=navigator.getGamepads?.()[0];
if(gp){
let ax=gp.axes[0]||0;
let ay=gp.axes[1]||0;
if(Math.abs(ax)>0.25) x+=ax;
if(Math.abs(ay)>0.25) y+=ay;

if(gp.buttons[12]?.pressed) y--;
if(gp.buttons[13]?.pressed) y++;
if(gp.buttons[14]?.pressed) x--;
if(gp.buttons[15]?.pressed) x++;
}

let l=Math.hypot(x,y);
if(l>1){x/=l;y/=l;}

return {x,y};
}

/* =========================
   COMBAT
========================= */

function combat(enemy){

let roll=d20();
let dmg=25;

let result=roll+dmg-enemy.def;

card.weapon.durability-=5;

if(roll<=5){card.health-=10;return"MISS";}
if(roll>=18){enemy.hp-=40;return"CRIT";}

if(result>20){enemy.hp-=25;return"HIT";}

enemy.hp-=10;
card.health-=5;
return"GLANCE";
}

/* =========================
   UPDATE
========================= */

function update(){

if(state!==STATE.PLAY) return;

let i=input();

card.x+=i.x*0.12;
card.y+=i.y*0.12;

/* hunger */
card.hunger-=0.01;

/* visibility */
seen[Math.floor(card.y)][Math.floor(card.x)]=true;

/* loot */
let t=world[Math.floor(card.y)][Math.floor(card.x)];

if(t==="L"){
world[Math.floor(card.y)][Math.floor(card.x)]=".";

let r=Math.random();

if(r<0.3)card.inventory.wood++;
else if(r<0.55)card.inventory.hardWood++;
else if(r<0.8)card.inventory.scrap++;
else if(r<0.95)card.inventory.parts++;
else card.inventory.coal++;
}

/* CAMPFIRE HEAL */
if(nearFire(card.x,card.y)){
card.hunger+=0.03;
card.health+=0.01;
}

/* RANDOM WILDLIFE (F zone) */
if(t==="F" && !nearFire(card.x,card.y) && Math.random()<0.01){
combat(spawnWolf());
}

/* clamp */
card.x=Math.max(0,Math.min(SIZE-1,card.x));
card.y=Math.max(0,Math.min(SIZE-1,card.y));

}

/* =========================
   CAMPFIRE UPDATE
========================= */

function updateCampfires(){

for(let c of campfires){
c.fuel-=0.02;

if(c.fuel<=0){
world[c.y][c.x]=".";
}
}

}

/* =========================
   RENDER
========================= */

function color(t){
return t==="F"?"#2ecc71":
t==="L"?"#f1c40f":
t==="R"?"#7f8c8d":"#111";
}

function render(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

let s=18;

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

if(!seen[y][x])continue;

let dx=x-card.x;
let dy=y-card.y;

let sx=c.width/2+dx*s;
let sy=c.height/2+dy*s;

let t=world[y][x];

if(t==="F"){
ctx.shadowBlur=10;
ctx.shadowColor="#ff6a00";
ctx.fillStyle="#ff3b1f";
ctx.fillText("≋",sx,sy);
ctx.shadowBlur=0;
}else{
ctx.fillStyle=color(t);
ctx.fillText(t,sx,sy);
}

}
}

ctx.fillStyle="#00ffcc";
ctx.fillText("@",c.width/2,c.height/2);

}

/* =========================
   DEVICE
========================= */

let device=false;
let menu=0;
const items=["GPS","INVENTORY","CRAFT","CARD","EXIT"];

function toggleDevice(){
device=!device;
document.getElementById("device").style.display=device?"block":"none";
if(device) renderDevice();
}

/* =========================
   DEVICE UI
========================= */

function renderDevice(){

document.getElementById("device").innerHTML=`
<h2>DEVICE</h2>

<p>${card.name}</p>
<p>H:${card.health.toFixed(1)} HUN:${card.hunger.toFixed(1)}</p>

<hr>

${items.map((m,i)=> (i===menu?"> ":"")+m).join("<br>")}

<hr>

<p>SCRAP:${card.inventory.scrap} COAL:${card.inventory.coal}</p>

<p>CAMPFIRES:${campfires.length}</p>
<p>${nearFire(card.x,card.y)?"🔥 SAFE":"⚠ WILD"}</p>
`;
}

/* =========================
   LOOP
========================= */

function loop(){

update();
updateCampfires();

if(state===STATE.PLAY) render();
if(state===STATE.DEVICE) renderDevice();

requestAnimationFrame(loop);
}

/* =========================
   BOOT
========================= */

let b=0;
let boot=document.getElementById("boot");

let t=setInterval(()=>{
b++;
boot.innerText="BOOTING DEVICE"+ ".".repeat(b%4);
if(b>10){
clearInterval(t);
boot.style.display="none";
loop();
}
},200);

</script>

</body>
   </html>
