<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Device Survival Index v3</title>
<style>
body { margin:0; background:#000; overflow:hidden; font-family:monospace; color:#00ffcc; }
canvas { display:block; background:#000; }
#device {
position:absolute; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.92);
display:none;
padding:20px;
box-sizing:border-box;
}
#boot {
position:absolute; top:0; left:0; width:100%; height:100%;
background:black;
color:#00ffcc;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="device"></div>
<div id="boot">BOOTING DEVICE...</div>

<script>

/* =========================
   SETUP
========================= */

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

/* =========================
   SAVE / CARD
========================= */

let card = JSON.parse(localStorage.getItem("card") || "null");

if(!card){
  let name = prompt("INSERT SURVIVAL CARD - NAME?");
  card = {
    name:name || "UNKNOWN",
    hunger:100,
    health:100,
    scrap:0,
    unlocked:{revolver:false},
    x:10,y:10
  };
  localStorage.setItem("card", JSON.stringify(card));
}

/* =========================
   WORLD
========================= */

const SIZE = 25;
let world = [];

for(let y=0;y<SIZE;y++){
  world[y]=[];
  for(let x=0;x<SIZE;x++){
    let r = Math.random();
    world[y][x] =
      r<0.7?"."
      :r<0.85?"F"
      :r<0.95?"L"
      :"R";
  }
}

/* F forest, L loot, R rock */

/* =========================
   GPS MEMORY
========================= */

let seen = Array.from({length:SIZE},()=>Array(SIZE).fill(false));

/* =========================
   PLAYER
========================= */

let p = card;

/* =========================
   INPUT (KEY + CONTROLLER)
========================= */

let keys = {};
window.addEventListener("keydown",e=>{
  keys[e.code]=true;
  if(e.code==="KeyE") toggleDevice();
});
window.addEventListener("keyup",e=>keys[e.code]=false);

/* =========================
   DEVICE
========================= */

let deviceOpen = false;
let menuIndex = 0;

const menu = [
"GPS NAV",
"INVENTORY",
"CRAFTING",
"STATUS"
];

function toggleDevice(){
  deviceOpen = !deviceOpen;
  document.getElementById("device").style.display = deviceOpen ? "block":"none";
  renderDevice();
}

/* =========================
   GAMEPAD SUPPORT
========================= */

function getPad(){
  return navigator.getGamepads ? navigator.getGamepads()[0] : null;
}

let lock=false;

function press(fn){
  if(lock) return;
  lock=true;
  fn();
  setTimeout(()=>lock=false,120);
}

function updateGamepad(){
  let gp = getPad();
  if(!gp) return;

  let up = gp.buttons[12]?.pressed;
  let down = gp.buttons[13]?.pressed;
  let A = gp.buttons[0]?.pressed;
  let B = gp.buttons[1]?.pressed;
  let START = gp.buttons[9]?.pressed;

  if(START) press(toggleDevice);

  if(!deviceOpen){
    if(up) p.y -= 0.1;
    if(down) p.y += 0.1;
  } else {
    if(up) press(()=>menuIndex--);
    if(down) press(()=>menuIndex++);
    if(A) press(selectMenu);
    if(B) press(toggleDevice);
  }
}

/* =========================
   MENU ACTIONS
========================= */

function selectMenu(){
  let item = menu[menuIndex % menu.length];

  if(item==="STATUS"){
    alert(`Hunger:${card.hunger} Health:${card.health}`);
  }

  if(item==="INVENTORY"){
    alert(`Scrap:${card.scrap}`);
  }

  if(item==="CRAFTING"){
    if(card.scrap>=3){
      card.unlocked.revolver=true;
      alert("Revolver knowledge unlocked");
    } else {
      alert("Need scrap");
    }
  }
}

/* =========================
   D20 SYSTEM
========================= */

function d20(){
  return Math.floor(Math.random()*20)+1;
}

/* =========================
   UPDATE WORLD
========================= */

function update(){

if(deviceOpen) return;

let sp = 0.12;

if(keys["ArrowUp"]) p.y-=sp;
if(keys["ArrowDown"]) p.y+=sp;
if(keys["ArrowLeft"]) p.x-=sp;
if(keys["ArrowRight"]) p.x+=sp;

/* hunger */
card.hunger -= 0.01;

/* reveal */
seen[Math.floor(p.y)]?.[Math.floor(p.x)] = true;

/* loot */
let x = Math.floor(p.x);
let y = Math.floor(p.y);

if(world[y]?.[x]==="L"){
  world[y][x]=".";
  card.scrap += 1;

  if(Math.random()>0.7){
    card.unlocked.revolver=true;
  }
}

}

/* =========================
   RENDER WORLD
========================= */

function render(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

let size=18;

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

if(!seen[y][x]) continue;

let dx=x-p.x;
let dy=y-p.y;

let sx=c.width/2+dx*size;
let sy=c.height/2+dy*size;

let t=world[y][x];

ctx.fillStyle =
t==="F"?"#0a3":
t==="L"?"#aa0":
t==="R"?"#555":"#111";

ctx.fillText(t,sx,sy);

}
}

ctx.fillStyle="#0f0";
ctx.fillText("@",c.width/2,c.height/2);

}

/* =========================
   DEVICE UI
========================= */

function renderDevice(){

let d=document.getElementById("device");

let gps = generateGPS();

d.innerHTML=`
<h2>DEVICE SURVIVAL INDEX</h2>
<p>USER: ${card.name}</p>
<p>HUNGER: ${card.hunger.toFixed(1)}</p>
<p>HEALTH: ${card.health}</p>

<hr>

<h3>MENU</h3>
${menu.map((m,i)=>
(i===menuIndex?"> ":"  ")+m
).join("<br>")}

<hr>

<h3>GPS MODULE</h3>
<pre>${gps}</pre>

<hr>

<p>Scrap: ${card.scrap}</p>
<p>Revolver: ${card.unlocked.revolver?"YES":"NO"}</p>

<p>Press START (controller) or E</p>
`;
}

/* =========================
   GPS MINI MAP
========================= */

function generateGPS(){

let out="┌──── GPS ────┐\n";

for(let y=0;y<6;y++){
let row="│ ";
for(let x=0;x<12;x++){

let wx = Math.floor(p.x)+x-6;
let wy = Math.floor(p.y)+y-3;

if(wx===Math.floor(p.x) && wy===Math.floor(p.y)) row+="P ";
else if(world[wy]?.[wx]==="F") row+="F ";
else if(world[wy]?.[wx]==="L") row+="L ";
else if(world[wy]?.[wx]==="R") row+="▓ ";
else row+="? ";
}
out+=row+"│\n";
}

out+="└────────────┘";
return out;
}

/* =========================
   BOOT
========================= */

setTimeout(()=>{
document.getElementById("boot").style.display="none";
},1200);

/* =========================
   LOOP
========================= */

function loop(){

update();
updateGamepad();
render();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
