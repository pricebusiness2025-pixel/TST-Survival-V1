<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ruined City Survival v1</title>
<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}

#title{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
color:white;
font-family:monospace;
z-index:10;
}
</style>
</head>

<body>

<div id="title">
<h1>RUINED CITY</h1>
<p>Press A to Start</p>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

const SIZE=40;

let world=[];
let buildings=[];
let props=[];
let loot=[];
let inventory=[];

let started=false;
let mode="game";

let p={x:10,y:10,a:0};

/* ---------------- WORLD ---------------- */

function gen(){
for(let y=0;y<SIZE;y++){
world[y]=[];
for(let x=0;x<SIZE;x++){
world[y][x]=(x%7===0||y%7===0)?0:1;
}
}
}

function genBuildings(){
let t=["🏚️","🏢","🏭","🏪","🚓"];
for(let i=0;i<40;i++){
buildings.push({
x:Math.random()*SIZE,
y:Math.random()*SIZE,
t:t[Math.random()*t.length|0]
});
}
}

function genProps(){
let t=["🌲","⚙️","🪧","🗑"];
for(let i=0;i<60;i++){
props.push({
x:Math.random()*SIZE,
y:Math.random()*SIZE,
t:t[Math.random()*t.length|0]
});
}
}

gen();
genBuildings();
genProps();

/* ---------------- SAFE GAMEPAD ---------------- */

function gp(){
return navigator.getGamepads?.()[0] || null;
}

/* ---------------- TILE ---------------- */

function tile(x,y){
x|=0;y|=0;
if(x<0||y<0||x>=SIZE||y>=SIZE) return 1;
return world[y][x];
}

/* ---------------- BUILDING ---------------- */

let near=null;

function enter(b){
let pool=[];

if(b.t==="🏚️") pool=["scrap","food"];
if(b.t==="🏢") pool=["scrap","ammo"];
if(b.t==="🏭") pool=["ammo","ammo","scrap"];
if(b.t==="🏪") pool=["food","food"];
if(b.t==="🚓") pool=["ammo","ammo","ammo"];

pool.forEach(i=>loot.push({t:i}));

b.visited=true;
}

/* ---------------- DRAW SKY ---------------- */

function sky(){
let g=ctx.createLinearGradient(0,0,0,c.height/2);
g.addColorStop(0,"#2a3a4a");
g.addColorStop(1,"#1a1a1a");
ctx.fillStyle=g;
ctx.fillRect(0,0,c.width,c.height/2);

ctx.fillStyle="#0b0b0b";
ctx.fillRect(0,c.height/2,c.width,c.height/2);
}

/* ---------------- MOVE ---------------- */

function move(){

let g=gp();

/* start */
if(!started && g?.buttons[0]?.pressed){
started=true;
document.getElementById("title").style.display="none";
}

/* menus */
if(!started) return;

if(g?.buttons[12]?.pressed) mode="inv";
if(g?.buttons[13]?.pressed) mode="craft";
if(g?.buttons[1]?.pressed) mode="game";

/* pause gameplay in menus */
if(mode!=="game") return;

/* input */
let lx=g?.axes?.[0]||0;
let ly=g?.axes?.[1]||0;
let rx=g?.axes?.[2]||0;

/* camera */
p.a+=rx*0.05;

/* movement */
let sp=g?.buttons[5]?.pressed?0.08:0.04;

let nx=p.x+Math.cos(p.a)*(-ly)*sp;
let ny=p.y+Math.sin(p.a)*(-ly)*sp;

nx+=Math.cos(p.a+Math.PI/2)*lx*sp;
ny+=Math.sin(p.a+Math.PI/2)*lx*sp;

if(tile(nx,p.y)===0)p.x=nx;
if(tile(p.x,ny)===0)p.y=ny;

/* building detect */
near=null;
buildings.forEach(b=>{
if(Math.hypot(p.x-b.x,p.y-b.y)<1.5) near=b;
});

/* enter */
if(g?.buttons[0]?.pressed && near){
enter(near);
}

/* shoot */
if(g?.buttons[7]?.pressed && loot.length>=0){
ctx.fillText("🔫 pew",50,50);
}

}

/* ---------------- DRAW ---------------- */

function draw(){

sky();

/* walls */
for(let i=0;i<c.width;i+=6){

let ra=p.a+(i-c.width/2)/180;

let d=0;
let hit=0;

while(d<20){
d+=0.1;

let x=p.x+Math.cos(ra)*d;
let y=p.y+Math.sin(ra)*d;

if(tile(x,y)){
hit=1;
break;
}
}

let shade=255-d*14;
shade=Math.max(60,shade);

ctx.fillStyle=`rgb(${shade},${shade*0.9},${shade*0.85})`;
ctx.fillRect(i,c.height/2,6,c.height/2);
}

/* buildings */
ctx.font="30px serif";
buildings.forEach(b=>{
let dx=b.x-p.x;
let dy=b.y-p.y;
let d=Math.hypot(dx,dy);

if(d>10)return;

let a=Math.atan2(dy,dx)-p.a;
if(Math.abs(a)>0.7)return;

let x=(a/0.7)*(c.width/2)+c.width/2;

ctx.fillText(b.t,x,c.height/2);
});

/* props */
ctx.font="20px serif";
props.forEach(p2=>{
let dx=p2.x-p.x;
let dy=p2.y-p.y;
let d=Math.hypot(dx,dy);

if(d>8)return;

let a=Math.atan2(dy,dx)-p.a;
if(Math.abs(a)>0.7)return;

let x=(a/0.7)*(c.width/2)+c.width/2;

ctx.fillText(p2.t,x,c.height/2);
});

}

/* ---------------- LOOP ---------------- */

function loop(){
move();

if(mode==="game"){
draw();
}else{
ctx.fillStyle="black";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="white";
ctx.fillText(mode.toUpperCase(),50,50);
}

requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
