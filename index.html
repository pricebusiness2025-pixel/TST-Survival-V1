<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Voxel Mars Surface</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
background:rgba(0,0,0,0.4);
padding:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD (HEIGHT MAP)
========================= */

const MAP=60;
let world=[];

/*
0 = sand (height 0)
1 = rock (height 1)
2 = plant (height 2+ glow)
*/

function generateWorld(){

for(let y=0;y<MAP;y++){
world[y]=[];

for(let x=0;x<MAP;x++){

let r=Math.random();

if(r<0.75) world[y][x]=0;
else if(r<0.92) world[y][x]=1;
else world[y][x]=2;

}

}

/* safe crash zone */
for(let y=10;y<18;y++){
for(let x=10;x<18;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:30,
y:30,
a:0,
vx:0,
vy:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){
const pads=navigator.getGamepads();
return pads ? pads[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   UPDATE PLAYER
========================= */

function updatePlayer(){

const pad=getPad();
if(!pad) return;

let lx=dz(pad.axes[0]);
let ly=dz(pad.axes[1]);
let rx=dz(pad.axes[2]);

lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

player.a += rx*0.05;

const accel=pad.buttons[5].pressed?0.01:0.006;
const friction=0.8;

player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

player.x+=player.vx;
player.y+=player.vy;

}

/* =========================
   VOXEL RENDER (FAKE 3D HEIGHT)
========================= */

function render(){

/* SKY */
let sky=ctx.createLinearGradient(0,0,0,canvas.height/2);
sky.addColorStop(0,"#2b0a3d");
sky.addColorStop(1,"#ff4a2f");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height/2);

/* SUN */
let sunX=canvas.width*0.5+(player.x-30)*10;

ctx.fillStyle="rgba(255,80,30,0.9)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,60,0,Math.PI*2);
ctx.fill();

/* GROUND BASE */
let ground=ctx.createLinearGradient(0,canvas.height/2,0,canvas.height);
ground.addColorStop(0,"#c89a62");
ground.addColorStop(1,"#7a5530");

ctx.fillStyle=ground;
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

/* =========================
   DRAW BLOCKS AS HEIGHT STACKS
========================= */

for(let y=0;y<MAP;y++){
for(let x=0;x<MAP;x++){

let tile=world[y][x];

let dx=x-player.x;
let dy=y-player.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist>25) continue;

/* angle */
let angle=Math.atan2(dy,dx)-player.a;

while(angle<-Math.PI) angle+=Math.PI*2;
while(angle>Math.PI) angle-=Math.PI*2;

if(Math.abs(angle)>1.2) continue;

/* screen position */
let screenX=(canvas.width/2)+Math.tan(angle)*(canvas.width/2);

/* fake depth */
let size=canvas.height/(dist*1.2);

/* height system */
let height=0;
if(tile===1) height=0.6;   // rock
if(tile===2) height=1.2;   // plant

/* color */
let r=200,g=160,b=100;

if(tile===1){ r=140; g=120; b=90; }
if(tile===2){ r=80; g=255; b=180; }

/* fog */
let fog=Math.max(0.15,1-dist/25);

ctx.globalAlpha=fog;

/* draw block (stack illusion) */
ctx.fillStyle=`rgb(${r},${g},${b})`;

ctx.fillRect(
screenX-size/2,
(canvas.height/2)-(size*height),
size,
size*height
);

ctx.globalAlpha=1;

}
}

/* fog overlay */
ctx.fillStyle="rgba(255,120,120,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

}

/* =========================
   LOOP
========================= */

function loop(){

updatePlayer();
render();

document.getElementById("ui").innerHTML=
`
🪨 VOXEL MARS<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
