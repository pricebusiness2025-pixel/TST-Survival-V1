<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Steampunk Survival v3</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:monospace;
    color:#aaa;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    z-index:5;
    color:#bbb;
    text-shadow:0 0 6px #000;
}

.bar{
    width:240px;
    height:12px;
    background:#111;
    margin:4px 0;
    border:1px solid #222;
}

.fill{
    height:100%;
    background:linear-gradient(to right, #400, #f00, #0f0);
    width:100%;
}

#start,#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(10,10,10,0.98);
    padding:15px;
    border:1px solid #333;
}

.option{
    padding:6px;
    margin:4px 0;
    background:#111;
}
.option.selected{background:#333;}
</style>
</head>

<body>

<div id="start">
<h2>Survivor</h2>
<button onclick="startGame('M')">Male</button>
<button onclick="startGame('F')">Female</button>
</div>

<div id="menu" style="display:none;">
<h3>Craft</h3>
<div id="recipes"></div>
<p>A craft | B close | X save</p>
</div>

<div id="hud">
Survival
<div class="bar"><div id="survival" class="fill"></div></div>

Weapon: <span id="weapon">Blade</span><br>
Ammo: <span id="ammo">-</span><br><br>

Meat <span id="meat">0</span> |
Bone <span id="bone">0</span> |
Pelt <span id="pelt">0</span> |
Scrap <span id="scrap">0</span><br><br>

Shelter: <span id="shelter">None</span><br>
Buggy: <span id="buggy">No</span>
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* ---------------- STATE ---------------- */

let character={gender:null};

let player={x:0,y:0,angle:0,survival:100};

let loot={meat:0,bone:0,pelt:0,scrap:3,gear:0,valve:0,coal:0};

let weapon={name:"Rust Blade",damage:10};
let ammo=0;

let shelter={type:null,x:0,y:0};

let campfire={x:0,y:0,active:false};

let buggy={owned:false,fuel:0,storage:[]};

let animals=[];

/* ---------------- START ---------------- */

function startGame(g){
character.gender=g;
document.getElementById("start").style.display="none";
loadGame();
}

/* ---------------- SAVE ---------------- */

function canSave(){
let d1 = shelter.type && Math.hypot(player.x-shelter.x,player.y-shelter.y)<180;
let d2 = campfire.active && Math.hypot(player.x-campfire.x,player.y-campfire.y)<150;
return d1||d2;
}

function saveGame(){
if(!canSave()) return;

localStorage.setItem("save", JSON.stringify({
character,player,loot,weapon,ammo,shelter,campfire,buggy
}));
}

function loadGame(){
let s=localStorage.getItem("save");
if(!s)return;
s=JSON.parse(s);

character=s.character;
player=s.player;
loot=s.loot;
weapon=s.weapon;
ammo=s.ammo;
shelter=s.shelter;
campfire=s.campfire;
buggy=s.buggy;
}

/* ---------------- CONTROLLER ---------------- */

function pad(){return navigator.getGamepads()[0];}
function dz(v){return Math.abs(v)<0.15?0:v;}

function control(){
let gp=pad();
if(!gp)return;

let lx=dz(gp.axes[0]);
let ly=dz(gp.axes[1]);

player.angle+=lx*0.05;

let sp=1.9;
player.x+=Math.cos(player.angle)*(-ly)*sp;
player.y+=Math.sin(player.angle)*(-ly)*sp;

if(gp.buttons[9].pressed){
document.getElementById("menu").style.display="block";
}

if(gp.buttons[2].pressed){
saveGame();
}
}

/* ---------------- WORLD ---------------- */

function spawn(){
let r=Math.random();
let t=r<0.4?"rabbit":r<0.75?"deer":"wolf";

animals.push({
x:player.x+(Math.random()*700-350),
y:player.y+(Math.random()*700-350),
type:t,
hp:t==="rabbit"?10:t==="deer"?25:45,
maxHp:t==="rabbit"?10:t==="deer"?25:45
});
}
setInterval(spawn,2600);

/* ---------------- UPDATE ---------------- */

function update(){

control();

player.survival-=0.01;

if(shelter.type){
let d=Math.hypot(player.x-shelter.x,player.y-shelter.y);
if(d<180)player.survival+=shelter.type==="hut"?0.06:0.03;
}

if(campfire.active){
let d=Math.hypot(player.x-campfire.x,player.y-campfire.y);
if(d<150)player.survival+=0.05;
}

player.survival=Math.max(0,Math.min(100,player.survival));

animals.forEach(a=>{
let dx=player.x-a.x;
let dy=player.y-a.y;
let d=Math.hypot(dx,dy);

if(a.type==="rabbit"&&d<200){a.x-=dx*0.03;a.y-=dy*0.03;}
if(a.type==="deer"&&d<250){a.x-=dx*0.02;a.y-=dy*0.02;}
if(a.type==="wolf"&&d<300){a.x+=dx*0.015;a.y+=dy*0.015;}
});

}

/* ---------------- DOOM RENDER ---------------- */

function draw(){

// heavy fog darkness (doom style)
ctx.fillStyle="#020202";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,c.width,c.height);

// subtle grain
for(let i=0;i<60;i++){
ctx.fillStyle="rgba(255,0,0,0.02)";
ctx.fillRect(Math.random()*c.width,Math.random()*c.height,2,2);
}

// player glow (ONLY bright object)
ctx.fillStyle="#00ffff";
ctx.beginPath();
ctx.arc(c.width/2,c.height/2,6,0,Math.PI*2);
ctx.fill();

// animals (low light silhouettes)
animals.forEach(a=>{
let dx=a.x-player.x;
let dy=a.y-player.y;

let x=c.width/2+dx*0.12;
let y=c.height/2+dy*0.12;

let size=16/Math.max(1,Math.hypot(dx,dy)*0.01);

ctx.fillStyle=a.type==="wolf"?"#aa0000":a.type==="deer"?"#227722":"#888";

ctx.beginPath();
ctx.arc(x,y,size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#300";
ctx.fillRect(x-size,y-10,size*2,3);

ctx.fillStyle="#0f0";
ctx.fillRect(x-size,y-10,size*2*(a.hp/a.maxHp),3);
});

// HUD
document.getElementById("survival").style.width=player.survival+"%";
document.getElementById("weapon").innerText=weapon.name;
document.getElementById("ammo").innerText=ammo;

document.getElementById("meat").innerText=loot.meat;
document.getElementById("bone").innerText=loot.bone;
document.getElementById("pelt").innerText=loot.pelt;
document.getElementById("scrap").innerText=loot.scrap;

document.getElementById("shelter").innerText=shelter.type||"None";
document.getElementById("buggy").innerText=buggy.owned?"Yes":"No";

}

/* ---------------- LOOP ---------------- */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
