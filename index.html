<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mars Grounded Emoji World</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
background:rgba(0,0,0,0.4);
padding:10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD
========================= */

const MAP=40;

/*
⬛ sand = empty
🪨 rock = solid
🌿 plant = passable + glow + sway
*/

let world=[];

function generateWorld(){

for(let y=0;y<MAP;y++){
world[y]=[];

for(let x=0;x<MAP;x++){

let r=Math.random();

if(r<0.78) world[y][x]="⬛";
else if(r<0.90) world[y][x]="🪨";
else world[y][x]="🌿";

}

}

/* crash site safe zone */
for(let y=14;y<20;y++){
for(let x=14;x<20;x++){
world[y][x]="⬛";
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:20,
y:20,
vx:0,
vy:0,
a:0
};

/* =========================
   INPUT
========================= */

function pad(){
const p=navigator.getGamepads();
return p ? p[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   COLLISION
========================= */

function isSolid(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(x<0||y<0||x>=MAP||y>=MAP) return true;

return world[y][x]==="🪨";
}

/* =========================
   UPDATE PLAYER
========================= */

function update(){

const p=pad();
if(!p) return;

let lx=dz(p.axes[0]);
let ly=dz(p.axes[1]);
let rx=dz(p.axes[2]);

lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

player.a += rx*0.05;

const accel=p.buttons[5].pressed?0.01:0.006;
const friction=0.8;

/* movement */
player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

let nx=player.x+player.vx;
let ny=player.y+player.vy;

/* collision */
if(!isSolid(nx,player.y)) player.x=nx;
else player.vx*=0.2;

if(!isSolid(player.x,ny)) player.y=ny;
else player.vy*=0.2;

}

/* =========================
   RENDER WORLD
========================= */

function render(){

/* SKY */
let sky=ctx.createLinearGradient(0,0,0,canvas.height/2);
sky.addColorStop(0,"#2b0a3d");
sky.addColorStop(1,"#ff4a2f");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height/2);

/* SUN (anchored + drifting) */
let sunX=canvas.width*0.5+(player.x-20)*10;

ctx.fillStyle="rgba(255,80,30,0.95)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,60,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="rgba(255,120,40,0.25)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,120,0,Math.PI*2);
ctx.fill();

/* GROUND */
let ground=ctx.createLinearGradient(
0,canvas.height/2,
0,canvas.height
);

ground.addColorStop(0,"#c89a62");
ground.addColorStop(1,"#7a5530");

ctx.fillStyle=ground;
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

/* FOG */
ctx.fillStyle="rgba(255,120,120,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* WIND */
let wind=Math.sin(Date.now()*0.002)*0.4;

/* =========================
   DRAW WORLD OBJECTS
========================= */

for(let y=0;y<MAP;y++){
for(let x=0;x<MAP;x++){

let tile=world[y][x];

let dx=x-player.x;
let dy=y-player.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist>18) continue;

/* angle */
let angle=Math.atan2(dy,dx)-player.a;

while(angle<-Math.PI) angle+=Math.PI*2;
while(angle>Math.PI) angle-=Math.PI*2;

if(Math.abs(angle)>1.2) continue;

/* screen position */
let screenX=(canvas.width/2)+Math.tan(angle)*(canvas.width/2);

/* perspective scale (FIXED) */
let size=canvas.height/(dist*1.1);

/* horizon anchor */
let horizon=canvas.height*0.58;
let groundY=horizon+size;

/* wind sway for plants */
let sway=wind*10;

/* PLANTS */
if(tile==="🌿"){

let glow=Math.sin(Date.now()*0.003 + x + y)*0.5+0.5;

ctx.globalAlpha=0.4+glow*0.6;

ctx.font=`${size}px Arial`;

ctx.fillText(
"🌿",
screenX+sway,
groundY
);

ctx.globalAlpha=1;
continue;
}

/* ROCKS */
if(tile==="🪨"){

ctx.globalAlpha=0.9;

ctx.font=`${size}px Arial`;

ctx.fillText(
"🪨",
screenX,
groundY
);

ctx.globalAlpha=1;
continue;
}

}
}

}

/* =========================
   LOOP
========================= */

function loop(){

update();
render();

document.getElementById("ui").innerHTML=
`
🪐 MARS SURFACE (GROUNDED)<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
