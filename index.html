<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mars Surface Atmosphere FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.45);
padding:10px;
line-height:1.5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================
   CANVAS
========================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD
========================= */

const MAP=50;
let world=[];

/*
0 = empty sand
1 = rock
2 = glowing plant
*/

function generateWorld(){

for(let y=0;y<MAP;y++){
world[y]=[];

for(let x=0;x<MAP;x++){

let r=Math.random();

if(r<0.75) world[y][x]=0;      // sand
else if(r<0.92) world[y][x]=1; // rock
else world[y][x]=2;           // glow plant

}

}

/* crash site safe zone */
for(let y=6;y<16;y++){
for(let x=6;x<16;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0,
vx:0,
vy:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){
const pads=navigator.getGamepads();
return pads ? pads[0] : null;
}

function dz(v){
return Math.abs(v)<0.15?0:v;
}

/* =========================
   WALL CHECK
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(x<0||y<0||x>=MAP||y>=MAP) return 1;

return world[y][x];

}

/* =========================
   PLAYER UPDATE
========================= */

function updatePlayer(){

const pad=getPad();
if(!pad) return;

let lx=dz(pad.axes[0]);
let ly=dz(pad.axes[1]);
let rx=dz(pad.axes[2]);

lx=Math.sign(lx)*(lx*lx);
ly=Math.sign(ly)*(ly*ly);
rx=Math.sign(rx)*(rx*rx);

player.a += rx*0.06;

const accel=pad.buttons[5].pressed?0.008:0.005;
const friction=0.72;

player.vx += Math.cos(player.a)*(-ly)*accel;
player.vy += Math.sin(player.a)*(-ly)*accel;

player.vx += Math.cos(player.a+Math.PI/2)*lx*accel;
player.vy += Math.sin(player.a+Math.PI/2)*lx*accel;

player.vx*=friction;
player.vy*=friction;

let sp=Math.hypot(player.vx,player.vy);
let max=pad.buttons[5].pressed?0.16:0.1;

if(sp>max){
player.vx=(player.vx/sp)*max;
player.vy=(player.vy/sp)*max;
}

let nx=player.x+player.vx;
let ny=player.y+player.vy;

const r=0.2;

if(!wall(nx+r,player.y)&&!wall(nx-r,player.y)){
player.x=nx;
}else player.vx*=0.3;

if(!wall(player.x,ny+r)&&!wall(player.x,ny-r)){
player.y=ny;
}else player.vy*=0.3;

}

/* =========================
   RENDER WORLD (MARS LIGHT)
========================= */

function renderWorld(){

/* 🌌 SKY (purple → pink Mars haze) */
let sky=ctx.createLinearGradient(0,0,0,canvas.height/2);
sky.addColorStop(0,"#2b0a3d");
sky.addColorStop(0.5,"#7a1b5e");
sky.addColorStop(1,"#ff4fa3");

ctx.fillStyle=sky;
ctx.fillRect(0,0,canvas.width,canvas.height/2);

/* ☀️ RED-ORANGE SUN */
let sunX = canvas.width*0.5 + (player.x-10)*25;

ctx.fillStyle="rgba(255,80,40,0.95)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,65,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="rgba(255,120,40,0.25)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,130,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="rgba(255,60,0,0.12)";
ctx.beginPath();
ctx.arc(sunX,canvas.height*0.2,200,0,Math.PI*2);
ctx.fill();

/* 🏜 SAND GROUND */
let ground=ctx.createLinearGradient(
0,canvas.height/2,
0,canvas.height
);

ground.addColorStop(0,"#b88e5a");
ground.addColorStop(1,"#7a5a33");

ctx.fillStyle=ground;
ctx.fillRect(0,canvas.height/2,canvas.width,canvas.height/2);

const FOV=Math.PI/3;

for(let x=0;x<canvas.width;x+=10){

let ray=(player.a-FOV/2)+(x/canvas.width)*FOV;

let dist=0;
let hit=false;
let wallType=0;

while(!hit && dist<16){

dist+=0.08;

let rx=player.x+Math.cos(ray)*dist;
let ry=player.y+Math.sin(ray)*dist;

let wx=Math.floor(rx);
let wy=Math.floor(ry);

if(wx>=0&&wy>=0&&wx<MAP&&wy<MAP){

if(world[wy][wx]>0){
hit=true;
wallType=world[wy][wx];
}

}

}

let corrected=dist*Math.cos(ray-player.a);

/* lighting */
let shade=150-corrected*11;
if(shade<30) shade=30;

/* mars tint */
let r=shade*1.2;
let g=shade*0.9;
let b=shade*0.6;

/* rock + plant variation */
if(wallType===1){
r*=0.9; g*=0.8; b*=0.7;
}
if(wallType===2){
r*=0.6; g*=1.2; b*=0.8;
}

ctx.fillStyle=`rgb(${r},${g},${b})`;

ctx.fillRect(
x,
(canvas.height/2)-(canvas.height/(corrected+0.2))/2,
10,
canvas.height/(corrected+0.2)
);

}

/* 🌫 FOG LAYER */
ctx.fillStyle="rgba(255,120,160,0.06)";
ctx.fillRect(0,0,canvas.width,canvas.height);

}

/* =========================
   LOOP
========================= */

function update(){

updatePlayer();

}

function loop(){

update();
renderWorld();

document.getElementById("ui").innerHTML=
`
🪐 MARS SURFACE<br>
X:${player.x.toFixed(1)} Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
