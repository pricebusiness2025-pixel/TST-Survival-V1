<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ruined City FPS Physics Build</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.45);
padding:10px;
line-height:1.5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================================
   WORLD
========================================= */

const MAP=50;
let world=[];

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

/* outer border */
if(
x===0||
y===0||
x===MAP-1||
y===MAP-1
){
world[y][x]=1;
}

/* streets */
else if(
x%7===0||
y%7===0
){
world[y][x]=0;
}

/* buildings */
else if(Math.random()<0.82){
world[y][x]=1;
}

else{
world[y][x]=0;
}

}

}

/* safe spawn */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================================
   PLAYER
========================================= */

let player={

x:10,
y:10,

a:0,

/* physics velocity */
vx:0,
vy:0

};

/* =========================================
   GAMEPAD
========================================= */

function getPad(){

const pads=navigator.getGamepads();

if(!pads) return null;

return pads[0];

}

function dz(v){

return Math.abs(v)<0.15 ? 0 : v;

}

/* =========================================
   WALL CHECK
========================================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(
x<0||
y<0||
x>=MAP||
y>=MAP
){
return 1;
}

return world[y][x];

}

/* =========================================
   UPDATE
========================================= */

function update(){

const pad=getPad();

if(!pad) return;

/* =========================
   STICKS
========================= */

const lx=dz(pad.axes[0]);
const ly=dz(pad.axes[1]);

const rx=dz(pad.axes[2]);

/* =========================
   CAMERA
========================= */

player.a += rx*0.065;

/* =========================
   MOVEMENT PHYSICS
========================= */

const accel=
pad.buttons[5].pressed
?0.025
:0.018;

const friction=0.82;

/* forward/back */
player.vx +=
Math.cos(player.a)*(-ly)*accel;

player.vy +=
Math.sin(player.a)*(-ly)*accel;

/* strafe */
player.vx +=
Math.cos(player.a+Math.PI/2)*lx*accel;

player.vy +=
Math.sin(player.a+Math.PI/2)*lx*accel;

/* friction */
player.vx *= friction;
player.vy *= friction;

/* next position */
let nx=player.x+player.vx;
let ny=player.y+player.vy;

/* player body radius */
const radius=0.2;

/* X collision */
if(
!wall(nx+radius,player.y) &&
!wall(nx-radius,player.y)
){
player.x=nx;
}
else{
player.vx*=0.3;
}

/* Y collision */
if(
!wall(player.x,ny+radius) &&
!wall(player.x,ny-radius)
){
player.y=ny;
}
else{
player.vy*=0.3;
}

}

/* =========================================
   RENDER
========================================= */

function render(){

/* sky */
let sky=
ctx.createLinearGradient(
0,
0,
0,
canvas.height/2
);

sky.addColorStop(0,"#29384d");
sky.addColorStop(1,"#4f6b8a");

ctx.fillStyle=sky;
ctx.fillRect(
0,
0,
canvas.width,
canvas.height/2
);

/* ground */
let floor=
ctx.createLinearGradient(
0,
canvas.height/2,
0,
canvas.height
);

floor.addColorStop(0,"#404040");
floor.addColorStop(1,"#1f1f1f");

ctx.fillStyle=floor;
ctx.fillRect(
0,
canvas.height/2,
canvas.width,
canvas.height/2
);

/* fog */
ctx.fillStyle="rgba(0,0,0,0.12)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

/* field of view */
const FOV=Math.PI/3;

/* raycast */
for(let x=0;x<canvas.width;x+=4){

let ray=
(player.a-FOV/2)+
(x/canvas.width)*FOV;

let dist=0;
let hit=false;

while(!hit && dist<20){

dist+=0.04;

let rx=
player.x+
Math.cos(ray)*dist;

let ry=
player.y+
Math.sin(ray)*dist;

if(wall(rx,ry)){
hit=true;
}

}

/* fisheye fix */
let corrected=
dist*Math.cos(ray-player.a);

/* wall height */
let h=
canvas.height/
(corrected+0.15);

/* shading */
let shade=
190-corrected*8;

if(shade<35){
shade=35;
}

/* texture illusion */
let tex=
Math.sin(corrected*8)*15;

let r=shade+tex;
let g=shade+tex;
let b=shade+tex+10;

ctx.fillStyle=
`rgb(${r},${g},${b})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
4,
h
);

/* fake cracks */
if(h>120){

ctx.fillStyle=
"rgba(0,0,0,0.18)";

ctx.fillRect(
x+1,
(canvas.height/2)-(h/2),
1,
h
);

}

}

}

/* =========================================
   LOOP
========================================= */

function loop(){

update();
render();

/* UI */
document.getElementById("ui").innerHTML=
`
🎮 CONTROLS<br>
LEFT STICK = MOVE<br>
RIGHT STICK = LOOK<br>
RB = SPRINT<br><br>

📍 POSITION<br>
X: ${player.x.toFixed(1)}<br>
Y: ${player.y.toFixed(1)}<br><br>

⚙ VELOCITY<br>
VX: ${player.vx.toFixed(2)}<br>
VY: ${player.vy.toFixed(2)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
