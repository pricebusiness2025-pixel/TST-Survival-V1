<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fixed Survival Core</title>
<style>
body{margin:0;overflow:hidden;background:#000;}
canvas{display:block;}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
}
</style>
</head>

<body>
<canvas id="c"></canvas>
<div id="ui"></div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* ================= WORLD ================= */

const SIZE=60;
let map=[];

/* build solid readable structure */
function genMap(){
for(let y=0;y<SIZE;y++){
map[y]=[];
for(let x=0;x<SIZE;x++){

// strong structure: not random chaos
if(x===0||y===0||x===SIZE-1||y===SIZE-1){
map[y][x]=1;
}
else if(x%8===0 || y%8===0){
map[y][x]=1; // streets / walls
}
else if(Math.random()<0.12){
map[y][x]=1; // buildings
}
else{
map[y][x]=0; // empty space
}

}
}
}
genMap();

/* ================= PLAYER ================= */

let p={
x:10,
y:10,
a:0
};

/* ================= INPUT ================= */

let keys={};

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

/* ================= TILE ================= */

function tile(x,y){
x|=0;y|=0;
if(x<0||y<0||x>=SIZE||y>=SIZE) return 1;
return map[y][x];
}

/* ================= MOVEMENT (FIXED FEEL) ================= */

function move(){

let speed=0.06;

/* rotation */
if(keys["ArrowLeft"]) p.a-=0.05;
if(keys["ArrowRight"]) p.a+=0.05;

/* forward/back */
let nx=p.x;
let ny=p.y;

if(keys["ArrowUp"]){
nx+=Math.cos(p.a)*speed;
ny+=Math.sin(p.a)*speed;
}

if(keys["ArrowDown"]){
nx-=Math.cos(p.a)*speed;
ny-=Math.sin(p.a)*speed;
}

/* strafe */
if(keys["a"]){
nx+=Math.cos(p.a+Math.PI/2)*speed;
ny+=Math.sin(p.a+Math.PI/2)*speed;
}

if(keys["d"]){
nx+=Math.cos(p.a-Math.PI/2)*speed;
ny+=Math.sin(p.a-Math.PI/2)*speed;
}

/* collision */
if(tile(nx,p.y)===0) p.x=nx;
if(tile(p.x,ny)===0) p.y=ny;

}

/* ================= RAYCAST ================= */

function render(){

/* FIX: proper sky + floor (no black/white split bug) */
ctx.fillStyle="#87b5ff";
ctx.fillRect(0,0,c.width,c.height/2);

ctx.fillStyle="#2a2a2a";
ctx.fillRect(0,c.height/2,c.width,c.height/2);

/* walls */
for(let x=0;x<c.width;x+=4){

let rayAngle=p.a + (x-c.width/2)/180;

let dist=0;
let hit=false;

while(!hit && dist<20){
dist+=0.05;

let tx=p.x + Math.cos(rayAngle)*dist;
let ty=p.y + Math.sin(rayAngle)*dist;

if(tile(tx,ty)){
hit=true;
}
}

let shade=255 - dist*18;
shade=Math.max(40,shade);

let height=c.height/(dist+0.1);

ctx.fillStyle=`rgb(${shade},${shade},${shade})`;
ctx.fillRect(x,(c.height/2)-height/2,4,height);

}

}

/* ================= LOOP ================= */

function loop(){
move();
render();

document.getElementById("ui").innerHTML=
`POS: ${p.x.toFixed(2)} , ${p.y.toFixed(2)}
ROT: ${p.a.toFixed(2)}
`;

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
