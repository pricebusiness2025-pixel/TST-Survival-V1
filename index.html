<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruined City Survival</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:monospace;
color:#ccc;
}

canvas{
display:block;
}

#hud{
position:absolute;
top:10px;
left:10px;
z-index:10;
font-size:14px;
text-shadow:0 0 5px #000;
}

.bar{
width:200px;
height:10px;
background:#111;
border:1px solid #333;
margin-bottom:5px;
}

.fill{
height:100%;
width:100%;
background:lime;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#200,#000);
display:flex;
justify-content:center;
align-items:center;
z-index:20;
}

.panel{
background:rgba(0,0,0,0.9);
padding:20px;
border:1px solid #500;
min-width:300px;
}

.option{
padding:10px;
margin:5px 0;
border:1px solid #222;
}

.selected{
background:#500;
}

#crosshair{
position:absolute;
left:50%;
top:50%;
width:6px;
height:6px;
border:1px solid #ccc;
margin-left:-3px;
margin-top:-3px;
z-index:5;
}
</style>
</head>

<body>

<div id="hud">
Survival
<div class="bar"><div id="survival" class="fill"></div></div>

Weapon: <span id="weapon">Revolver</span><br>
Ammo: <span id="ammo">6</span><br><br>

Meat: <span id="meat">0</span><br>
Scrap: <span id="scrap">0</span><br>
Bone: <span id="bone">0</span><br>

Lantern: <span id="lantern">ON</span>
</div>

<div id="crosshair"></div>

<div id="menu">
<div class="panel">
<h2>RUINED CITY</h2>
<div id="menuOptions"></div>
</div>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

/* ---------------- STATE ---------------- */
let state = "menu";
let menuIndex = 0;

let menu = ["ENTER CITY","SAVE"];

/* ---------------- PLAYER ---------------- */
let player = {
x:3,
y:3,
angle:0,
survival:100
};

/* ---------------- WORLD ---------------- */
const SIZE = 24;
let world = [];
let zone = [];

function generateCity(){

for(let y=0;y<SIZE;y++){
world[y]=[];
zone[y]=[];

for(let x=0;x<SIZE;x++){

let road = (x%6===0 || y%6===0);

if(road){
world[y][x]=0;
zone[y][x]="road";
}else{

let r = Math.random();

if(r<0.6){
world[y][x]=1;
zone[y][x]="building";
}else if(r<0.85){
world[y][x]=2;
zone[y][x]="ruin";
}else{
world[y][x]=3;
zone[y][x]="debris";
}

}

}

}

}

generateCity();

/* ---------------- WALL ---------------- */
function wall(x,y){

let gx=Math.floor(x);
let gy=Math.floor(y);

if(gx<0||gy<0||gx>=SIZE||gy>=SIZE)
return true;

return world[gy][gx]===1||world[gy][gx]===3;

}

/* ---------------- INPUT ---------------- */
let prev={};
let input={};

function pressed(gp,i){
let c=gp.buttons[i]?.pressed;
let r=c&&!prev[i];
prev[i]=c;
return r;
}

function updateInput(){

let gp=navigator.getGamepads()[0];
if(!gp)return;

let dz=v=>Math.abs(v)<0.15?0:v;

input.mx=dz(gp.axes[0]);
input.my=dz(gp.axes[1]);

input.a=pressed(gp,0);
input.x=pressed(gp,2);

input.rb=gp.buttons[5].pressed;

input.up=pressed(gp,12);
input.down=pressed(gp,13);
input.left=pressed(gp,14);
input.right=pressed(gp,15);
}

/* ---------------- MENU ---------------- */
function updateMenu(){

if(input.up) menuIndex--;
if(input.down) menuIndex++;

menuIndex=(menuIndex+menu.length)%menu.length;

if(input.a && menu[menuIndex]==="ENTER CITY"){
state="game";
document.getElementById("menu").style.display="none";
}

if(input.a && menu[menuIndex]==="SAVE"){
localStorage.setItem("save","ok");
}

}

/* ---------------- LOOT ---------------- */
let lootObjects=[];

function spawnLoot(){

let x=Math.floor(Math.random()*SIZE);
let y=Math.floor(Math.random()*SIZE);

if(zone[y][x]!=="building"){

lootObjects.push({
x,y,
type:["meat","scrap","bone"][Math.floor(Math.random()*3)],
taken:false
});

}

}

setInterval(spawnLoot,4000);

/* ---------------- WOLVES ---------------- */
let wolves=[];

function spawnWolf(){

for(let i=0;i<10;i++){

let x=Math.floor(Math.random()*SIZE);
let y=Math.floor(Math.random()*SIZE);

if(zone[y][x]==="road"){

wolves.push({
x,y,
awake:Date.now()+2000,
state:"patrol"
});

break;

}

}

}

setInterval(spawnWolf,7000);

/* ---------------- MOVEMENT ---------------- */
let vel=0,rot=0;

function move(){

let mx=input.mx;
let my=input.my;

vel+=(my-vel)*0.2;
rot+=(mx-rot)*0.2;

player.angle+=rot*0.05;

let speed=input.rb?0.09:0.05;

let nx=player.x+Math.cos(player.angle)*vel*speed;
let ny=player.y+Math.sin(player.angle)*vel*speed;

if(!wall(nx,player.y))player.x=nx;
if(!wall(player.x,ny))player.y=ny;

}

/* ---------------- LOOT PICKUP ---------------- */
function lootPickup(){

lootObjects.forEach(l=>{

if(l.taken)return;

let d=Math.hypot(player.x-l.x,player.y-l.y);

if(d<1.2)l.taken=true;

});

}

/* ---------------- WOLVES UPDATE ---------------- */
function wolvesUpdate(){

wolves.forEach(w=>{

let dx=player.x-w.x;
let dy=player.y-w.y;
let d=Math.hypot(dx,dy);

if(Date.now()<w.awake)return;

if(d<6){

w.x+=dx*0.002;
w.y+=dy*0.002;

}

if(d<0.6)player.survival-=0.04;

});

}

/* ---------------- RENDER ---------------- */
const FOV=Math.PI/3;
const rays=140;

function cast(a){

let d=0;

while(d<20){

let x=player.x+Math.cos(a)*d;
let y=player.y+Math.sin(a)*d;

if(wall(x,y))return d;

d+=0.02;

}

return 20;
}

function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

/* walls */
for(let i=0;i<rays;i++){

let a=player.angle-FOV/2+(i/rays)*FOV;

let d=cast(a);
d*=Math.cos(a-player.angle);

let h=c.height/d;

let shade=220-d*18;

if(shade<20)shade=20;

ctx.fillStyle=`rgb(${shade},${shade*0.3},${shade*0.2})`;

ctx.fillRect(i*(c.width/rays),c.height/2-h/2,c.width/rays+1,h);

}

/* loot */
lootObjects.forEach(l=>{

if(l.taken)return;

let dx=l.x-player.x;
let dy=l.y-player.y;

let d=Math.hypot(dx,dy);
if(d>8)return;

let ang=Math.atan2(dy,dx)-player.angle;

if(Math.abs(ang)>FOV/2)return;

let x=(ang/(FOV/2))*(c.width/2)+c.width/2;

let size=160/d;

let col="#777";
if(l.type==="meat")col="#aa3333";
if(l.type==="scrap")col="#888";
if(l.type==="bone")col="#ddd";

ctx.fillStyle=col;
ctx.fillRect(x-size/4,c.height/2-size/4,size/2,size/2);

});

/* wolves */
wolves.forEach(w=>{

let dx=w.x-player.x;
let dy=w.y-player.y;

let d=Math.hypot(dx,dy);
if(d>8)return;

let ang=Math.atan2(dy,dx)-player.angle;

if(Math.abs(ang)>FOV/2)return;

let x=(ang/(FOV/2))*(c.width/2)+c.width/2;

let size=300/d;

ctx.fillStyle="rgba(120,30,30,0.9)";
ctx.fillRect(x-size/2,c.height/2-size/2,size,size);

ctx.strokeStyle="rgba(255,80,80,0.5)";
ctx.strokeRect(x-size/2,c.height/2-size/2,size,size);

});

/* fog */
let g=ctx.createRadialGradient(
c.width/2,c.height/2,20,
c.width/2,c.height/2,320
);

g.addColorStop(0,"rgba(255,200,120,0.15)");
g.addColorStop(1,"rgba(0,0,0,0.92)");

ctx.fillStyle=g;
ctx.fillRect(0,0,c.width,c.height);

/* HUD */
document.getElementById("survival").style.width=player.survival+"%";
}

/* ---------------- LOOP ---------------- */
function loop(){

updateInput();

if(state==="menu"){
updateMenu();
}else{
move();
lootPickup();
wolvesUpdate();
player.survival-=0.002;
}

draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
    </html>
