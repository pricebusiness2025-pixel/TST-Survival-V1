<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Device Survival Engine v1</title>

<style>
body {
margin:0;
background:#000;
overflow:hidden;
font-family:monospace;
color:#00ffcc;
}

canvas {
display:block;
background:#000;
}

#ui {
position:absolute;
bottom:10px;
left:10px;
color:#fff;
font-size:12px;
}

#device {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
padding:20px;
box-sizing:border-box;
}

#boot {
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:#00ffcc;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="device"></div>
<div id="boot">BOOTING DEVICE</div>

<script>

/* =========================
   CANVAS
========================= */

const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

ctx.font = "16px monospace";

/* =========================
   GAME STATE (IMPORTANT FIX)
========================= */

const STATE = {
  BOOT: "boot",
  PLAY: "play",
  DEVICE: "device"
};

let gameState = STATE.BOOT;

/* =========================
   PLAYER / SAVE
========================= */

let card = JSON.parse(localStorage.getItem("card") || "null");

if(!card){
  let name = prompt("INSERT SURVIVAL CARD NAME");
  card = {
    name: name || "UNKNOWN",
    hunger: 100,
    health: 100,
    scrap: 0,
    x: 10,
    y: 10,
    unlocked: {
      revolver:false
    }
  };
  localStorage.setItem("card", JSON.stringify(card));
}

/* =========================
   WORLD
========================= */

const SIZE = 25;
let world = [];

for(let y=0;y<SIZE;y++){
  world[y]=[];
  for(let x=0;x<SIZE;x++){
    let r = Math.random();
    world[y][x] =
      r<0.7?"."
      :r<0.85?"F"
      :r<0.95?"L"
      :"R";
  }
}

/* =========================
   VISIBILITY MAP
========================= */

let seen = Array.from({length:SIZE},()=>Array(SIZE).fill(false));

/* =========================
   INPUT
========================= */

let keys = {};

window.addEventListener("keydown",e=>{
  keys[e.code]=true;

  if(e.code==="KeyE"){
    toggleDevice();
  }
});

window.addEventListener("keyup",e=>{
  keys[e.code]=false;
});

/* =========================
   DEVICE
========================= */

let deviceIndex = 0;
const deviceMenu = ["GPS","INVENTORY","CRAFT","STATUS"];

function toggleDevice(){
  if(gameState === STATE.BOOT) return;

  if(gameState === STATE.DEVICE){
    gameState = STATE.PLAY;
    document.getElementById("device").style.display="none";
  } else {
    gameState = STATE.DEVICE;
    document.getElementById("device").style.display="block";
    renderDevice();
  }
}

/* =========================
   GAMEPAD
========================= */

function pad(){
  return navigator.getGamepads ? navigator.getGamepads()[0] : null;
}

let lock=false;
function press(fn){
  if(lock) return;
  lock=true;
  fn();
  setTimeout(()=>lock=false,120);
}

/* =========================
   UPDATE GAMEPAD
========================= */

function updateGamepad(){
  let gp = pad();
  if(!gp) return;

  let up = gp.buttons[12]?.pressed;
  let down = gp.buttons[13]?.pressed;
  let A = gp.buttons[0]?.pressed;
  let B = gp.buttons[1]?.pressed;
  let START = gp.buttons[9]?.pressed;

  if(START) press(toggleDevice);

  if(gameState === STATE.PLAY){

    if(up) card.y -= 0.1;
    if(down) card.y += 0.1;

  }

  if(gameState === STATE.DEVICE){

    if(up) press(()=>deviceIndex--);
    if(down) press(()=>deviceIndex++);
    if(A) press(onSelect);
    if(B) press(toggleDevice);

  }
}

/* =========================
   DEVICE ACTIONS
========================= */

function onSelect(){
  let m = deviceMenu[deviceIndex % deviceMenu.length];

  if(m==="STATUS"){
    alert(`Hunger:${card.hunger.toFixed(1)} Health:${card.health}`);
  }

  if(m==="CRAFT"){
    if(card.scrap>=3){
      card.unlocked.revolver=true;
      alert("Revolver unlocked");
    } else {
      alert("Need scrap");
    }
  }
}

/* =========================
   WORLD UPDATE
========================= */

function update(){

if(gameState !== STATE.PLAY) return;

card.hunger -= 0.01;

/* movement keyboard */
if(keys["ArrowUp"]) card.y -= 0.1;
if(keys["ArrowDown"]) card.y += 0.1;
if(keys["ArrowLeft"]) card.x -= 0.1;
if(keys["ArrowRight"]) card.x += 0.1;

/* reveal map */
let x = Math.floor(card.x);
let y = Math.floor(card.y);

if(seen[y]) seen[y][x]=true;

/* loot */
if(world[y]?.[x]==="L"){
  world[y][x]=".";
  card.scrap++;
}

}

/* =========================
   RENDER WORLD
========================= */

function renderWorld(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

let size=18;

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

if(!seen[y][x]) continue;

let dx = x - card.x;
let dy = y - card.y;

let sx = c.width/2 + dx*size;
let sy = c.height/2 + dy*size;

let t = world[y][x];

ctx.fillStyle =
t==="F"?"#0a3":
t==="L"?"#aa0":
t==="R"?"#555":"#111";

ctx.fillText(t,sx,sy);

}
}

ctx.fillStyle="#0f0";
ctx.fillText("@",c.width/2,c.height/2);

}

/* =========================
   DEVICE RENDER
========================= */

function renderDevice(){

let d = document.getElementById("device");

d.innerHTML = `
<h2>DEVICE SURVIVAL INDEX</h2>
<p>USER: ${card.name}</p>
<p>HUNGER: ${card.hunger.toFixed(1)}</p>
<p>SCRAP: ${card.scrap}</p>

<hr>

<h3>MENU</h3>

${deviceMenu.map((m,i)=>
(i===deviceIndex?"> ":"  ")+m
).join("<br>")}

<hr>

<h3>GPS</h3>
<pre>${generateGPS()}</pre>
`;
}

/* =========================
   GPS
========================= */

function generateGPS(){

let out="┌── GPS ──┐\n";

for(let y=0;y<6;y++){
let row="│ ";

for(let x=0;x<10;x++){

let wx = Math.floor(card.x)+x-5;
let wy = Math.floor(card.y)+y-3;

if(wx===Math.floor(card.x)&&wy===Math.floor(card.y)) row+="P ";
else if(world[wy]?.[wx]==="F") row+="F ";
else if(world[wy]?.[wx]==="L") row+="L ";
else if(world[wy]?.[wx]==="R") row+="▓ ";
else row+="? ";

}

out+=row+"│\n";
}

out+="└────────┘";
return out;
}

/* =========================
   BOOT SEQUENCE (FIXED)
========================= */

let bootTimer = 0;

function boot(){

let b = document.getElementById("boot");

let t = setInterval(()=>{

bootTimer++;

b.innerText = "BOOTING DEVICE" + ".".repeat(bootTimer%4);

if(bootTimer > 10){
clearInterval(t);
b.style.display="none";
gameState = STATE.PLAY;
}

},200);

}

boot();

/* =========================
   MAIN LOOP (CLEAN)
========================= */

function loop(){

update();
updateGamepad();

if(gameState === STATE.PLAY){
renderWorld();
}

if(gameState === STATE.DEVICE){
renderDevice();
}

document.getElementById("ui").innerText =
`STATE:${gameState} | SCRAP:${card.scrap}`;

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
