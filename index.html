<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ruined City Render Pass</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.4);
padding:8px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================
   WORLD
========================= */

const MAP=50;
let world=[];

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

/* border */
if(
x===0||
y===0||
x===MAP-1||
y===MAP-1
){
world[y][x]=1;
}

/* city streets */
else if(
x%7===0||
y%7===0
){
world[y][x]=0;
}

/* buildings */
else if(Math.random()<0.82){
world[y][x]=1;
}

else{
world[y][x]=0;
}

}

}

/* spawn safe zone */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0
};

/* =========================
   GAMEPAD
========================= */

function getPad(){

const pads=navigator.getGamepads();

if(!pads) return null;

return pads[0];

}

function dz(v){

return Math.abs(v)<0.15 ? 0 : v;

}

/* =========================
   WALL
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(
x<0||
y<0||
x>=MAP||
y>=MAP
){
return 1;
}

return world[y][x];

}

/* =========================
   UPDATE
========================= */

function update(){

const pad=getPad();

if(!pad) return;

/* sticks */
const lx=dz(pad.axes[0]);
const ly=dz(pad.axes[1]);
const rx=dz(pad.axes[2]);

/* smoother rotation */
player.a += rx*0.04;

/* sprint */
const speed=
pad.buttons[5].pressed
?0.11
:0.07;

/* movement */
let mx=0;
let my=0;

/* forward/back */
mx += Math.cos(player.a)*(-ly)*speed;
my += Math.sin(player.a)*(-ly)*speed;

/* strafe */
mx += Math.cos(player.a+Math.PI/2)*lx*speed;
my += Math.sin(player.a+Math.PI/2)*lx*speed;

/* collision */
let nx=player.x+mx;
let ny=player.y+my;

if(!wall(nx,player.y)){
player.x=nx;
}

if(!wall(player.x,ny)){
player.y=ny;
}

}

/* =========================
   RENDER
========================= */

function render(){

/* sky gradient */
let sky=
ctx.createLinearGradient(
0,0,0,canvas.height/2
);

sky.addColorStop(0,"#29384d");
sky.addColorStop(1,"#4f6b8a");

ctx.fillStyle=sky;
ctx.fillRect(
0,
0,
canvas.width,
canvas.height/2
);

/* ground */
let floor=
ctx.createLinearGradient(
0,
canvas.height/2,
0,
canvas.height
);

floor.addColorStop(0,"#3f3f3f");
floor.addColorStop(1,"#1e1e1e");

ctx.fillStyle=floor;
ctx.fillRect(
0,
canvas.height/2,
canvas.width,
canvas.height/2
);

/* fog overlay */
ctx.fillStyle="rgba(0,0,0,0.12)";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

/* FOV */
const FOV=Math.PI/3;

/* PERFORMANCE:
   larger ray columns */
for(let x=0;x<canvas.width;x+=4){

let ray=
(player.a-FOV/2)+
(x/canvas.width)*FOV;

let dist=0;
let hit=false;

/* PERFORMANCE:
   bigger ray step */
while(!hit && dist<20){

dist+=0.04;

let rx=
player.x+
Math.cos(ray)*dist;

let ry=
player.y+
Math.sin(ray)*dist;

if(wall(rx,ry)){
hit=true;
}

}

/* fisheye correction */
let corrected=
dist*Math.cos(ray-player.a);

/* wall height */
let h=
canvas.height/
(corrected+0.15);

/* ruined wall texture illusion */
let shade=
190-corrected*8;

if(shade<35){
shade=35;
}

/* texture variation */
let tex=
Math.sin(corrected*8)*15;

/* final wall color */
let r=shade+tex;
let g=shade+tex;
let b=shade+tex;

/* subtle blue tint */
b+=10;

ctx.fillStyle=
`rgb(${r},${g},${b})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
4,
h
);

/* fake cracks */
if(h>120){

ctx.fillStyle=
"rgba(0,0,0,0.18)";

ctx.fillRect(
x+1,
(canvas.height/2)-(h/2),
1,
h
);

}

}

}

/* =========================
   LOOP
========================= */

function loop(){

update();
render();

document.getElementById("ui").innerHTML=
`
LEFT STICK = MOVE<br>
RIGHT STICK = LOOK<br>
RB = SPRINT<br>
X:${player.x.toFixed(1)}
Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
