<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ruined City Immersion v5</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:monospace}
canvas{display:block}

#hud{
position:absolute;top:10px;left:10px;
color:#ddd;font-size:14px;
text-shadow:0 0 5px #000;
z-index:5
}

.bar{width:200px;height:10px;background:#111;border:1px solid #333}
.fill{height:100%;background:lime}

#hint{
position:absolute;bottom:20px;left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:6px 10px;
color:#fff;
display:none;
}
</style>
</head>

<body>

<div id="hud">
Survival
<div class="bar"><div id="survival" class="fill"></div></div>
Ammo: <span id="ammo">6</span> |
Scrap: <span id="scrap">0</span>
</div>

<div id="hint"></div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* ---------------- WORLD ---------------- */
const SIZE=24;
let world=[],zone=[];

function gen(){
for(let y=0;y<SIZE;y++){
world[y]=[];
zone[y]=[];
for(let x=0;x<SIZE;x++){

let road=(x%6===0||y%6===0);

if(road){
world[y][x]=0;
zone[y][x]="road";
}else{
let r=Math.random();
if(r<0.6){world[y][x]=1;zone[y][x]="building";}
else if(r<0.85){world[y][x]=2;zone[y][x]="ruin";}
else{world[y][x]=3;zone[y][x]="debris";}
}
}
}
}
gen();

/* ---------------- PLAYER ---------------- */
let p={x:3,y:3,a:0,s:100};

/* ---------------- REVOLVER ---------------- */
let ammo=6;
let cooldown=0;

/* ---------------- LOOT ---------------- */
let loot=[];

/* ---------------- WILDLIFE ---------------- */
let wildlife=[];

/* ---------------- LAMPS ---------------- */
let lamps=[];
for(let i=0;i<14;i++){
lamps.push({x:Math.random()*SIZE,y:Math.random()*SIZE});
}

/* ---------------- SPAWN SYSTEMS ---------------- */
setInterval(()=>{
let types=["🐇","🦌"];
wildlife.push({
x:Math.random()*SIZE,
y:Math.random()*SIZE,
type:Math.random()<0.7?"🐇":"🦌",
dir:Math.random()*Math.PI*2,
alive:true
});
},4000);

setInterval(()=>{
let x=Math.random()*SIZE|0;
let y=Math.random()*SIZE|0;
loot.push({x,y,t:"scrap",d:false});
},3500);

/* ---------------- WALL CHECK ---------------- */
function wall(x,y){
let gx=x|0,gy=y|0;
if(gx<0||gy<0||gx>=SIZE||gy>=SIZE)return true;
return world[gy][gx]===1 || world[gy][gx]===3;
}

/* ---------------- INPUT ---------------- */
let gp;

/* ---------------- CAST ---------------- */
function cast(a){
let d=0;
while(d<20){
let x=p.x+Math.cos(a)*d;
let y=p.y+Math.sin(a)*d;
if(wall(x,y))return d;
d+=0.03;
}
return 20;
}

/* ---------------- MOVEMENT ---------------- */
function move(){
gp=navigator.getGamepads()[0];
if(!gp)return;

p.a+=gp.axes[0]*0.04;

let f=-gp.axes[1];
let sp=gp.buttons[5]?.pressed?0.09:0.05;

let nx=p.x+Math.cos(p.a)*f*sp;
let ny=p.y+Math.sin(p.a)*f*sp;

if(!wall(nx,p.y))p.x=nx;
if(!wall(p.x,ny))p.y=ny;

/* SHOOT */
if(gp.buttons[0]?.pressed && cooldown<=0 && ammo>0){
shoot();
ammo--;
cooldown=20;
}
}

/* ---------------- SHOOT ---------------- */
function shoot(){

wildlife.forEach(w=>{
if(!w.alive)return;

let dx=w.x-p.x;
let dy=w.y-p.y;
let d=Math.hypot(dx,dy);

if(d<0.6){
w.alive=false;
loot.push({x:w.x,y:w.y,t:"meat",d:false});
}
});

}

/* ---------------- UPDATE WILDLIFE ---------------- */
function updateWildlife(){
wildlife.forEach(w=>{
if(!w.alive)return;

let dx=p.x-w.x;
let dy=p.y-w.y;
let d=Math.hypot(dx,dy);

if(w.type==="🐇" && d<5){
w.x+=dx*0.01;
w.y+=dy*0.01;
return;
}

if(w.type==="🦌" && d<6){
w.x+=dx*0.005;
w.y+=dy*0.005;
return;
}

w.dir+=(Math.random()-0.5)*0.1;
w.x+=Math.cos(w.dir)*0.01;
w.y+=Math.sin(w.dir)*0.01;
});
}

/* ---------------- LOOT PICKUP ---------------- */
let nearby=null;

function lootUpdate(){
nearby=null;

loot.forEach(l=>{
if(l.d)return;

let d=Math.hypot(p.x-l.x,p.y-l.y);
if(d<1.5)nearby=l;
});
}

/* ---------------- DRAW ---------------- */
function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

/* WALLS */
for(let i=0;i<140;i++){
let a=p.a-0.6+(i/140)*1.2;
let d=cast(a);
d*=Math.cos(a-p.a);

let h=c.height/d;

let hitX=p.x+Math.cos(a)*d;
let hitY=p.y+Math.sin(a)*d;

let shade=255-d*16;
shade=Math.max(30,shade);

let pattern=(hitX*3+hitY*5)%3;
if(pattern<1)shade*=0.95;
else if(pattern<2)shade*=0.9;

let tile=world[hitY|0]?.[hitX|0]||1;

if(tile===1)ctx.fillStyle=`rgb(${shade},${shade*0.85},${shade*0.8})`;
else if(tile===2)ctx.fillStyle=`rgb(${shade*0.7},${shade*0.6},${shade*0.55})`;
else ctx.fillStyle=`rgb(${shade*0.4},${shade*0.4},${shade*0.4})`;

ctx.fillRect(i*(c.width/140),c.height/2-h/2,c.width/140+1,h);
}

/* LAMPS */
lamps.forEach(l=>{
let dx=l.x-p.x,dy=l.y-p.y;
let d=Math.hypot(dx,dy);
if(d>10)return;

let a=Math.atan2(dy,dx)-p.a;
if(Math.abs(a)>0.8)return;

let x=(a/0.8)*(c.width/2)+c.width/2;

ctx.fillStyle=`rgba(255,220,140,${0.2*(1-d/10)})`;
ctx.beginPath();
ctx.arc(x,c.height/2,200/d,0,Math.PI*2);
ctx.fill();
});

/* LOOT */
loot.forEach(l=>{
if(l.d)return;

let dx=l.x-p.x,dy=l.y-p.y;
let d=Math.hypot(dx,dy);
if(d>8)return;

let a=Math.atan2(dy,dx)-p.a;
if(Math.abs(a)>0.7)return;

let x=(a/0.7)*(c.width/2)+c.width/2;
let size=180/d;

ctx.fillStyle="rgba(200,200,255,0.15)";
ctx.beginPath();
ctx.arc(x,c.height/2,size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#ddd";
ctx.fillRect(x-size/4,c.height/2-size/4,size/2,size/2);
});

/* WILDLIFE */
wildlife.forEach(w=>{
if(!w.alive)return;

let dx=w.x-p.x,dy=w.y-p.y;
let d=Math.hypot(dx,dy);
if(d>10)return;

let a=Math.atan2(dy,dx)-p.a;
if(Math.abs(a)>0.7)return;

let x=(a/0.7)*(c.width/2)+c.width/2;

let scale=240/d;

ctx.fillStyle="rgba(0,0,0,0.4)";
ctx.fillText(w.type,x+2,c.height/2+2);

ctx.font=`${scale}px serif`;
ctx.fillStyle="rgba(255,255,255,0.9)";
ctx.fillText(w.type,x,c.height/2);
});

/* FOG */
let g=ctx.createRadialGradient(
c.width/2,c.height/2,20,
c.width/2,c.height/2,420
);

g.addColorStop(0,"rgba(255,220,160,0.10)");
g.addColorStop(0.5,"rgba(40,30,20,0.25)");
g.addColorStop(1,"rgba(0,0,0,0.98)");

ctx.fillStyle=g;
ctx.fillRect(0,0,c.width,c.height);

/* HUD */
document.getElementById("ammo").innerText=ammo;

/* HINT */
let hint=document.getElementById("hint");
if(nearby){
hint.style.display="block";
hint.innerText="[A] Pick up "+nearby.t;
}else hint.style.display="none";
}

/* ---------------- LOOP ---------------- */
function loop(){
move();
updateWildlife();
lootUpdate();

if(cooldown>0)cooldown--;

draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
