<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Controller FPS Core</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const MAP=40;

let world=[];

/* =========================
   WORLD
========================= */

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

if(
x===0||
y===0||
x===MAP-1||
y===MAP-1
){
world[y][x]=1;
}

/* structured streets */
else if(
x%6===0||
y%6===0
){
world[y][x]=1;
}

else{
world[y][x]=0;
}

}

}

/* guaranteed spawn */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0
};

/* =========================
   CONTROLLER
========================= */

function getPad(){

const pads=navigator.getGamepads();

if(!pads) return null;

return pads[0];

}

function dead(v){

if(Math.abs(v)<0.15) return 0;

return v;

}

/* =========================
   WALL
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(
x<0||
y<0||
x>=MAP||
y>=MAP
){
return 1;
}

return world[y][x];

}

/* =========================
   UPDATE
========================= */

function update(){

const pad=getPad();

if(!pad) return;

/* LEFT STICK = MOVEMENT */
const lx=dead(pad.axes[0]);
const ly=dead(pad.axes[1]);

/* RIGHT STICK = CAMERA */
const rx=dead(pad.axes[2]);

/* sprint */
let speed=
pad.buttons[5].pressed
?0.10
:0.06;

/* camera */
player.a += rx*0.05;

/* movement */
let moveX=0;
let moveY=0;

/* forward/back */
moveX += Math.cos(player.a)*(-ly)*speed;
moveY += Math.sin(player.a)*(-ly)*speed;

/* strafe */
moveX += Math.cos(player.a+Math.PI/2)*lx*speed;
moveY += Math.sin(player.a+Math.PI/2)*lx*speed;

/* collision */
let nx=player.x+moveX;
let ny=player.y+moveY;

if(!wall(nx,player.y)){
player.x=nx;
}

if(!wall(player.x,ny)){
player.y=ny;
}

}

/* =========================
   RENDER
========================= */

function render(){

/* sky */
ctx.fillStyle="#6fa8ff";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height/2
);

/* ground */
ctx.fillStyle="#555";
ctx.fillRect(
0,
canvas.height/2,
canvas.width,
canvas.height/2
);

/* field of view */
const FOV=Math.PI/3;

/* raycasting */
for(let x=0;x<canvas.width;x+=2){

let rayAngle=
(player.a-FOV/2)+
(x/canvas.width)*FOV;

let dist=0;
let hit=false;

while(!hit && dist<20){

dist+=0.03;

let rx=
player.x+
Math.cos(rayAngle)*dist;

let ry=
player.y+
Math.sin(rayAngle)*dist;

if(wall(rx,ry)){
hit=true;
}

}

/* fisheye fix */
let corrected=
dist*Math.cos(rayAngle-player.a);

/* wall size */
let h=
canvas.height/
(corrected+0.1);

/* shading */
let shade=
255-corrected*10;

if(shade<50){
shade=50;
}

ctx.fillStyle=
`rgb(${shade},${shade},${shade})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
2,
h
);

}

}

/* =========================
   LOOP
========================= */

function loop(){

update();
render();

document.getElementById("ui").innerHTML=
`
LEFT STICK = MOVE<br>
RIGHT STICK = LOOK<br>
RB = SPRINT<br>
X:${player.x.toFixed(1)}
Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
