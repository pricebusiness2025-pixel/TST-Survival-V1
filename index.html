<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Device Survival v7</title>

<style>
body{margin:0;background:#000;overflow:hidden;font-family:monospace;}
canvas{display:block;}
#ui{position:absolute;bottom:10px;left:10px;color:#888;font-size:12px;}
#device{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
color:#00ffcc;
padding:16px;
display:none;
}
#boot{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:#000;color:#00ffcc;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="device"></div>
<div id="boot">BOOTING V7 ENGINE...</div>

<script>

/* =========================
   CANVAS
========================= */

const c=document.getElementById("c");
const ctx=c.getContext("2d");
ctx.font="16px monospace";

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

/* =========================
   ENGINE STATE
========================= */

const STATE={
PLAY:"play",
COMBAT:"combat",
DEVICE:"device"
};

let gameState=STATE.PLAY;

/* =========================
   PLAYER
========================= */

let card={
name:prompt("NAME?")||"UNKNOWN",
x:10,y:10,
health:100,
hunger:100,
scrap:0,
inventory:{wood:0,scrap:0,coal:0},
weapon:{durability:100}
};

/* =========================
   WORLD
========================= */

const SIZE=30;
let world=Array.from({length:SIZE},()=>Array(SIZE).fill("."));

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){
let r=Math.random();
world[y][x]=r<0.7?".":r<0.85?"F":r<0.95?"L":"R";
}
}

/* =========================
   VISIBILITY
========================= */

let seen=Array.from({length:SIZE},()=>Array(SIZE).fill(false));

/* =========================
   INPUT (GLOBAL)
========================= */

let keys={};

addEventListener("keydown",e=>{
keys[e.code]=true;

if(e.code==="KeyE") toggleDevice();
if(e.code==="Space") action();
});

addEventListener("keyup",e=>keys[e.code]=false);

/* =========================
   GAMEPAD
========================= */

function gp(){
return navigator.getGamepads?.()[0];
}

/* =========================
   INPUT SYSTEM (NO STATE BLOCKING)
========================= */

function input(){

let x=0,y=0;

/* keyboard */
if(keys["ArrowUp"]) y--;
if(keys["ArrowDown"]) y++;
if(keys["ArrowLeft"]) x--;
if(keys["ArrowRight"]) x++;

/* controller */
let g=gp();
if(g){

if(g.buttons[12]?.pressed) y--;
if(g.buttons[13]?.pressed) y++;
if(g.buttons[14]?.pressed) x--;
if(g.buttons[15]?.pressed) x++;

let ax=g.axes[0]||0;
let ay=g.axes[1]||0;

if(Math.abs(ax)>0.2) x+=ax;
if(Math.abs(ay)>0.2) y+=ay;

}

let l=Math.hypot(x,y);
if(l>1){x/=l;y/=l;}

return {x,y};
}

/* =========================
   COMBAT SYSTEM
========================= */

let enemy=null;

function spawnEnemy(){
enemy={hp:50,def:5};
gameState=STATE.COMBAT;
}

function d20(){return Math.floor(Math.random()*20)+1;}

function resolveCombat(){

let roll=d20();
let dmg=20;

let res=roll+dmg-enemy.def;

card.weapon.durability-=5;

if(roll<=5) card.health-=10;
else if(roll>=18) enemy.hp-=30;
else if(res>20) enemy.hp-=20;
else enemy.hp-=10;

card.health-=5;

if(enemy.hp<=0){
gameState=STATE.PLAY;
enemy=null;
card.scrap++;
}

}

/* =========================
   WORLD LOGIC
========================= */

function worldLogic(){

let t=world[Math.floor(card.y)][Math.floor(card.x)];

/* loot */
if(t==="L"){
world[Math.floor(card.y)][Math.floor(card.x)]=".";
card.inventory.scrap++;
}

/* random encounter */
if(t==="F" && Math.random()<0.008){
spawnEnemy();
}

}

/* =========================
   UPDATE LOOP
========================= */

function update(){

let i=input();

/* DEVICE ALWAYS AVAILABLE */
if(keys["KeyE"]) toggleDevice();

/* PLAY MOVEMENT */
if(gameState===STATE.PLAY){

card.x+=i.x*0.12;
card.y+=i.y*0.12;

card.hunger-=0.01;

seen[Math.floor(card.y)][Math.floor(card.x)]=true;

worldLogic();

}

/* COMBAT STATE */
if(gameState===STATE.COMBAT){
/* no movement */
}

/* clamp */
card.x=Math.max(0,Math.min(SIZE-1,card.x));
card.y=Math.max(0,Math.min(SIZE-1,card.y));

}

/* =========================
   RENDER
========================= */

function render(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

let s=18;

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

if(!seen[y][x]) continue;

let dx=x-card.x;
let dy=y-card.y;

let sx=c.width/2+dx*s;
let sy=c.height/2+dy*s;

let t=world[y][x];

if(t==="F"){
ctx.fillStyle="#ff4b1f";
ctx.shadowBlur=10;
ctx.shadowColor="#ff9900";
ctx.fillText("≋",sx,sy);
ctx.shadowBlur=0;
}
else{
ctx.fillStyle=
t==="L"?"#f1c40f":
t==="R"?"#7f8c8d":"#2ecc71";

ctx.fillText(t,sx,sy);
}

}
}

ctx.fillStyle="#00ffcc";
ctx.fillText("@",c.width/2,c.height/2);

/* enemy indicator */
if(gameState===STATE.COMBAT){
ctx.fillText("ENEMY",c.width/2,c.height/2-30);
}

}

/* =========================
   DEVICE
========================= */

let device=false;

function toggleDevice(){
device=!device;
gameState=device?STATE.DEVICE:STATE.PLAY;
document.getElementById("device").style.display=device?"block":"none";
}

/* =========================
   DEVICE UI
========================= */

function deviceUI(){

document.getElementById("device").innerHTML=`
<h2>DEVICE V7</h2>

<p>${card.name}</p>

<p>H:${card.health.toFixed(1)} HUN:${card.hunger.toFixed(1)}</p>

<hr>

SCRAP:${card.inventory.scrap} COAL:${card.inventory.coal}

<p>STATE:${gameState}</p>

<p>${gameState===STATE.COMBAT?"⚔ COMBAT ACTIVE (SPACE TO ATTACK)":"SAFE"}</p>
`;
}

/* =========================
   ACTION
========================= */

function action(){

if(gameState===STATE.COMBAT){
resolveCombat();
}

}

/* =========================
   LOOP
========================= */

function loop(){

update();

if(gameState===STATE.DEVICE) deviceUI();
render();

document.getElementById("ui").innerText=
`STATE:${gameState} SCRAP:${card.inventory.scrap}`;

requestAnimationFrame(loop);
}

/* =========================
   BOOT
========================= */

let b=0;
let boot=document.getElementById("boot");

let t=setInterval(()=>{
b++;
boot.innerText="BOOTING V7 ENGINE"+ ".".repeat(b%4);
if(b>10){
clearInterval(t);
boot.style.display="none";
loop();
}
},200);

</script>

</body>
</html>
