<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Grounded Ruined City FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
image-rendering:pixelated;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
background:rgba(0,0,0,0.45);
padding:10px;
line-height:1.5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

/* =========================================
   CANVAS
========================================= */

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* =========================================
   WORLD
========================================= */

const MAP=50;
let world=[];

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

/* border walls */
if(
x===0||
y===0||
x===MAP-1||
y===MAP-1
){
world[y][x]=1;
}

/* streets */
else if(
x%7===0||
y%7===0
){
world[y][x]=0;
}

/* buildings */
else if(Math.random()<0.82){
world[y][x]=1;
}

else{
world[y][x]=0;
}

}

}

/* spawn area */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================================
   PLAYER
========================================= */

let player={

x:10,
y:10,

a:0,

vx:0,
vy:0

};

/* =========================================
   GAMEPAD
========================================= */

function getPad(){

const pads=navigator.getGamepads();

if(!pads) return null;

return pads[0];

}

function dz(v){

return Math.abs(v)<0.15 ? 0 : v;

}

/* =========================================
   WALL
========================================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(
x<0||
y<0||
x>=MAP||
y>=MAP
){
return 1;
}

return world[y][x];

}

/* =========================================
   UPDATE
========================================= */

function update(){

const pad=getPad();

if(!pad) return;

/* sticks */
const lx=dz(pad.axes[0]);
const ly=dz(pad.axes[1]);

const rx=dz(pad.axes[2]);

/* camera */
player.a += rx*0.065;

/* =========================================
   MOVEMENT
========================================= */

const accel=
pad.buttons[5].pressed
?0.014
:0.010;

const friction=0.72;

/* forward/back */
player.vx +=
Math.cos(player.a)*(-ly)*accel;

player.vy +=
Math.sin(player.a)*(-ly)*accel;

/* strafe */
player.vx +=
Math.cos(player.a+Math.PI/2)*lx*accel;

player.vy +=
Math.sin(player.a+Math.PI/2)*lx*accel;

/* friction */
player.vx *= friction;
player.vy *= friction;

/* speed clamp */
const maxSpeed=
pad.buttons[5].pressed
?0.16
:0.10;

let speed=Math.hypot(
player.vx,
player.vy
);

if(speed>maxSpeed){

player.vx=
(player.vx/speed)*maxSpeed;

player.vy=
(player.vy/speed)*maxSpeed;

}

/* next position */
let nx=player.x+player.vx;
let ny=player.y+player.vy;

/* player radius */
const radius=0.2;

/* X collision */
if(
!wall(nx+radius,player.y) &&
!wall(nx-radius,player.y)
){
player.x=nx;
}
else{
player.vx*=0.3;
}

/* Y collision */
if(
!wall(player.x,ny+radius) &&
!wall(player.x,ny-radius)
){
player.y=ny;
}
else{
player.vy*=0.3;
}

}

/* =========================================
   RENDER
========================================= */

function render(){

/* sky */
ctx.fillStyle="#425d7a";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height/2
);

/* ground */
ctx.fillStyle="#2d2d2d";
ctx.fillRect(
0,
canvas.height/2,
canvas.width,
canvas.height/2
);

/* FOV */
const FOV=Math.PI/3;

/* optimized raycasting */
for(let x=0;x<canvas.width;x+=8){

let ray=
(player.a-FOV/2)+
(x/canvas.width)*FOV;

let dist=0;
let hit=false;

while(!hit && dist<16){

dist+=0.08;

let rx=
player.x+
Math.cos(ray)*dist;

let ry=
player.y+
Math.sin(ray)*dist;

if(wall(rx,ry)){
hit=true;
}

}

/* fisheye correction */
let corrected=
dist*Math.cos(ray-player.a);

/* wall height */
let h=
canvas.height/
(corrected+0.2);

/* shading */
let shade=
170-corrected*10;

if(shade<30){
shade=30;
}

ctx.fillStyle=
`rgb(${shade},${shade},${shade+8})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
8,
h
);

}

}

/* =========================================
   LOOP
========================================= */

function loop(){

update();
render();

/* UI */
document.getElementById("ui").innerHTML=
`
🎮 CONTROLS<br>
LEFT STICK = MOVE<br>
RIGHT STICK = LOOK<br>
RB = SPRINT<br><br>

📍 POSITION<br>
X: ${player.x.toFixed(1)}<br>
Y: ${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
