<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Playable Doom City Core</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:monospace;
font-size:14px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const MAP=40;
const TILE=1;

let world=[];

/* =========================
   MAP GENERATION
========================= */

function generateWorld(){

for(let y=0;y<MAP;y++){

world[y]=[];

for(let x=0;x<MAP;x++){

/* outer walls */
if(
x===0||
y===0||
x===MAP-1||
y===MAP-1
){
world[y][x]=1;
}

/* city blocks */
else if(
x%6===0||
y%6===0
){
world[y][x]=1;
}

/* open space */
else{
world[y][x]=0;
}

}

}

/* guaranteed spawn area */
for(let y=8;y<14;y++){
for(let x=8;x<14;x++){
world[y][x]=0;
}
}

}

generateWorld();

/* =========================
   PLAYER
========================= */

let player={
x:10,
y:10,
a:0
};

/* =========================
   INPUT
========================= */

let keys={};

window.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

window.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

/* =========================
   COLLISION
========================= */

function wall(x,y){

x=Math.floor(x);
y=Math.floor(y);

if(x<0||y<0||x>=MAP||y>=MAP){
return 1;
}

return world[y][x];

}

/* =========================
   MOVEMENT
========================= */

function update(){

let moveSpeed=0.06;
let rotSpeed=0.04;

/* rotate */
if(keys["arrowleft"]){
player.a-=rotSpeed;
}

if(keys["arrowright"]){
player.a+=rotSpeed;
}

/* movement */
let mx=0;
let my=0;

/* forward */
if(keys["w"]||keys["arrowup"]){
mx+=Math.cos(player.a)*moveSpeed;
my+=Math.sin(player.a)*moveSpeed;
}

/* backward */
if(keys["s"]||keys["arrowdown"]){
mx-=Math.cos(player.a)*moveSpeed;
my-=Math.sin(player.a)*moveSpeed;
}

/* strafe left */
if(keys["a"]){
mx+=Math.cos(player.a-Math.PI/2)*moveSpeed;
my+=Math.sin(player.a-Math.PI/2)*moveSpeed;
}

/* strafe right */
if(keys["d"]){
mx+=Math.cos(player.a+Math.PI/2)*moveSpeed;
my+=Math.sin(player.a+Math.PI/2)*moveSpeed;
}

/* collision */
let nx=player.x+mx;
let ny=player.y+my;

if(!wall(nx,player.y)){
player.x=nx;
}

if(!wall(player.x,ny)){
player.y=ny;
}

}

/* =========================
   RENDER
========================= */

function render(){

/* sky */
ctx.fillStyle="#5a88c9";
ctx.fillRect(0,0,canvas.width,canvas.height/2);

/* ground */
ctx.fillStyle="#4b4b4b";
ctx.fillRect(
0,
canvas.height/2,
canvas.width,
canvas.height/2
);

/* field of view */
const FOV=Math.PI/3;

/* raycasting */
for(let x=0;x<canvas.width;x+=2){

let rayAngle=
(player.a-FOV/2)+
(x/canvas.width)*FOV;

let dist=0;
let hit=false;

while(!hit && dist<20){

dist+=0.02;

let rx=
player.x+
Math.cos(rayAngle)*dist;

let ry=
player.y+
Math.sin(rayAngle)*dist;

if(wall(rx,ry)){
hit=true;
}

}

/* fisheye correction */
let corrected=
dist*Math.cos(rayAngle-player.a);

/* wall height */
let h=
canvas.height/
(corrected+0.1);

/* shading */
let shade=
255-corrected*12;

if(shade<40){
shade=40;
}

ctx.fillStyle=
`rgb(${shade},${shade},${shade})`;

ctx.fillRect(
x,
(canvas.height/2)-(h/2),
2,
h
);

}

}

/* =========================
   LOOP
========================= */

function loop(){

update();
render();

document.getElementById("ui").innerHTML=
`
WASD = Move<br>
Arrow Keys = Turn<br>
X:${player.x.toFixed(1)}
Y:${player.y.toFixed(1)}
`;

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
