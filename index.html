<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Device Survival V8 FULL</title>

<style>
body{margin:0;background:#000;overflow:hidden;font-family:monospace;}
canvas{display:block;}

#ui{
position:absolute;
bottom:10px;
left:10px;
color:#888;
font-size:12px;
z-index:2;
}

#device{
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
color:#00ffcc;
padding:14px;
display:none;
overflow:auto;
z-index:3;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="device"></div>

<script>

/* =========================
   ENGINE CORE
========================= */

const STATE={
PLAY:"play",
DEVICE:"device",
COMBAT:"combat"
};

let state=STATE.PLAY;

/* =========================
   PLAYER
========================= */

let card={
name:prompt("NAME?")||"SURVIVOR",
x:10,y:10,
health:100,
hunger:100,
inventory:{wood:0,scrap:0,coal:0},
weapon:{durability:100}
};

/* =========================
   WORLD
========================= */

const SIZE=25;
let world=Array.from({length:SIZE},()=>Array(SIZE).fill("."));

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){
let r=Math.random();
world[y][x]=r<0.75?".":r<0.9?"L":"F";
}
}

/* =========================
   VISIBILITY
========================= */

let seen=Array.from({length:SIZE},()=>Array(SIZE).fill(false));

/* =========================
   INPUT
========================= */

let keys={};

addEventListener("keydown",e=>{
keys[e.code]=true;
});

addEventListener("keyup",e=>{
keys[e.code]=false;
});

/* =========================
   GAMEPAD SAFE
========================= */

function gp(){
try{
let g=navigator.getGamepads?.();
return g?.[0]||null;
}catch{return null;}
}

/* =========================
   INPUT VECTOR
========================= */

function input(){

let x=0,y=0;

/* keyboard */
if(keys["ArrowUp"]) y--;
if(keys["ArrowDown"]) y++;
if(keys["ArrowLeft"]) x--;
if(keys["ArrowRight"]) x++;

/* controller */
let g=gp();

if(g && g.connected){

let ax=g.axes?.[0]||0;
let ay=g.axes?.[1]||0;

if(Math.abs(ax)>0.2) x+=ax;
if(Math.abs(ay)>0.2) y+=ay;

if(g.buttons?.[12]?.pressed) y--;
if(g.buttons?.[13]?.pressed) y++;
if(g.buttons?.[14]?.pressed) x--;
if(g.buttons?.[15]?.pressed) x++;

}

let len=Math.hypot(x,y);
if(len>1){x/=len;y/=len;}

return {x,y};
}

/* =========================
   CAMPFIRE SYSTEM
========================= */

let campfires=[];

function nearFire(x,y){
return campfires.some(c=>Math.hypot(c.x-x,c.y-y)<4);
}

/* =========================
   CRAFTING SYSTEM
========================= */

const CRAFT=[
{
name:"Campfire",
cost:{wood:2,scrap:1},
place:true
},
{
name:"Bandage",
cost:{scrap:1},
heal:20
}
];

/* =========================
   LEGEND
========================= */

const LEGEND={
".":"empty",
"L":"loot",
"F":"fire",
"C":"campfire",
"R":"rock"
};

/* =========================
   DEVICE MENU
========================= */

const MENU=["LEGEND","CRAFT","STATUS"];

let menuIndex=0;

/* =========================
   COMBAT
========================= */

let enemy=null;

function spawnEnemy(){
enemy={hp:50};
state=STATE.COMBAT;
}

function d20(){
return Math.floor(Math.random()*20)+1;
}

function attack(){

let roll=d20();

if(roll>=15) enemy.hp-=25;
else if(roll<=5) card.health-=10;
else enemy.hp-=10;

card.weapon.durability-=5;

if(enemy.hp<=0){
enemy=null;
state=STATE.PLAY;
card.inventory.scrap++;
}

}

/* =========================
   WORLD LOGIC
========================= */

function worldLogic(){

let t=world[Math.floor(card.y)][Math.floor(card.x)];

if(t==="L"){
world[Math.floor(card.y)][Math.floor(card.x)]=".";
card.inventory.scrap++;
}

if(t==="F" && Math.random()<0.006){
spawnEnemy();
}

}

/* =========================
   UPDATE
========================= */

function update(){

let i=input();

/* DEVICE TOGGLE */
if(keys["KeyE"]){
state = state===STATE.DEVICE?STATE.PLAY:STATE.DEVICE;
keys["KeyE"]=false;
}

/* DEVICE MENU */
if(state===STATE.DEVICE){

if(keys["ArrowUp"]){menuIndex--;keys["ArrowUp"]=false;}
if(keys["ArrowDown"]){menuIndex++;keys["ArrowDown"]=false;}

menuIndex=Math.max(0,Math.min(MENU.length-1,menuIndex));
}

/* PLAY */
if(state===STATE.PLAY){

card.x+=i.x*0.12;
card.y+=i.y*0.12;

card.hunger-=0.01;

seen[Math.floor(card.y)][Math.floor(card.x)]=true;

worldLogic();

}

/* COMBAT */
if(state===STATE.COMBAT){

if(keys["Space"]){
attack();
keys["Space"]=false;
}

}

}

/* =========================
   RENDER WORLD
========================= */

function render(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,c.width,c.height);

let s=18;

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

if(!seen[y][x]) continue;

let dx=x-card.x;
let dy=y-card.y;

let sx=c.width/2+dx*s;
let sy=c.height/2+dy*s;

let t=world[y][x];

ctx.fillStyle=
t==="L"?"#f1c40f":
t==="F"?"#ff4b1f":
"#2ecc71";

ctx.fillText(t,sx,sy);

}
}

ctx.fillStyle="#00ffcc";
ctx.fillText("@",c.width/2,c.height/2);

/* enemy */
if(state===STATE.COMBAT){
ctx.fillText("ENEMY HP:"+enemy.hp,c.width/2-50,c.height/2-30);
}

}

/* =========================
   DEVICE UI
========================= */

function deviceUI(){

let html=`<h2>DEVICE V8</h2>`;
html+=`<p>${card.name}</p>`;
html+=`<p>HP:${card.health.toFixed(0)} HUN:${card.hunger.toFixed(0)}</p>`;
html+=`<p>SCRAP:${card.inventory.scrap}</p>`;

html+=`<hr>MENU:<br>`;

MENU.forEach((m,i)=>{
html+=(i===menuIndex?"> ":"")+m+"<br>";
});

html+="<hr>";

if(MENU[menuIndex]==="LEGEND"){
for(let k in LEGEND){
html+=`${k} = ${LEGEND[k]}<br>`;
}
}

if(MENU[menuIndex]==="CRAFT"){
CRAFT.forEach(c=>{
html+=`<p>${c.name}</p>`;

let ok=true;
for(let k in c.cost){
if(card.inventory[k]<c.cost[k]) ok=false;
}

html+= ok?"✔ READY":"✖ MISSING";
html+="<br><br>";
});
}

if(MENU[menuIndex]==="STATUS"){
html+=`<p>LOCATION: ${Math.floor(card.x)},${Math.floor(card.y)}</p>`;
html+=`<p>HUNGER: ${card.hunger.toFixed(1)}</p>`;
html+=`<p>STATE: ${state}</p>`;
}

document.getElementById("device").innerHTML=html;
}

/* =========================
   LOOP
========================= */

function loop(){

update();
render();

if(state===STATE.DEVICE) deviceUI();
if(state!==STATE.DEVICE){
document.getElementById("device").style.display="none";
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
   </html>
